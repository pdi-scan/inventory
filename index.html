<!DOCTYPE html>
<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, Arial;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
    }

    label {
      display: block;
      text-align: left;
      max-width: 420px;
      margin: 0 auto 4px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input {
      width: 100%;
      max-width: 420px;
      padding: 14px;
      font-size: 16px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: auto;
      border-radius: 12px;
      overflow: hidden;
      background: black;
    }

    /* 🔥 FIXED BUTTON LAYOUT (IMPORTANT) */
    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 420px;
      margin: 10px auto 0;
    }

    button {
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      width: 100%;
    }

    #startBtn {
      background: #2563eb;
    }

    #exitBtn {
      background: #dc2626;
    }

    button:disabled {
      background: #9ca3af !important;
    }

    #status {
      margin-top: 20px;
      padding: 12px;
      background: white;
      border-radius: 8px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      font-size: 16px;
    }

    .ok { color: green; font-weight: bold; }
  </style>
</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

  <!-- USER -->
  <label>Device/User</label>
  <input id="user" type="text" placeholder="Enter your name">

  <!-- PROJECT -->
  <label>Project ID</label>
  <input id="projectId" type="text" placeholder="Enter Project ID">

  <!-- QTY -->
  <label>Qty</label>
  <input id="qty" type="number" min="1" value="1">

  <!-- BUTTONS (FIXED VISIBILITY) -->
  <div class="button-row">

    <button id="startBtn" onclick="startScanner()" disabled>
      📷 Start
    </button>

    <button id="exitBtn" onclick="exitApp()">
      ❌ Exit
    </button>

  </div>

  <div id="reader"></div>

  <div id="status">Enter User + Project ID</div>

</div>

<script>

const API_URL =
  "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* =========================
   STATE (ANTI DOUBLE SCAN)
========================= */
let html5QrCode;
let scanLock = false;
let lastScan = "";
let lastScanTime = 0;

/* =========================
   LOAD USER
========================= */
window.addEventListener("load", () => {
  const savedUser = localStorage.getItem("scan_user");
  if (savedUser) {
    document.getElementById("user").value = savedUser;
  }
  checkReady();
});

/* =========================
   SAVE USER
========================= */
document.getElementById("user").addEventListener("input", function () {
  localStorage.setItem("scan_user", this.value.trim());
  checkReady();
});

document.getElementById("projectId").addEventListener("input", checkReady);

function checkReady() {
  const user = document.getElementById("user").value.trim();
  const project = document.getElementById("projectId").value.trim();

  document.getElementById("startBtn").disabled = !(user && project);
}

/* =========================
   START SCANNER
========================= */
function startScanner() {

  const user = document.getElementById("user").value.trim();
  const projectId = document.getElementById("projectId").value.trim();

  if (!user || !projectId) {
    alert("User and Project ID required");
    return;
  }

  document.getElementById("status").innerText =
    `Project: ${projectId} | User: ${user}`;

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: 250 },
    onScanSuccess
  );
}

/* =========================
   DOUBLE SCAN PREVENTION
========================= */
function onScanSuccess(decodedText) {

  const now = Date.now();
  const itemId = (decodedText || "").toString().trim();

  if (!itemId) return;
  if (scanLock) return;
  if (itemId === lastScan && (now - lastScanTime) < 2000) return;

  scanLock = true;
  lastScan = itemId;
  lastScanTime = now;

  html5QrCode.stop().then(() => {

    sendToAPI(itemId);

    setTimeout(() => {
      scanLock = false;
      startScanner();
    }, 1500);

  });
}

/* =========================
   SEND TO BACKEND
========================= */
function sendToAPI(itemId) {

  const user = document.getElementById("user").value.trim();
  const projectId = document.getElementById("projectId").value.trim();
  const qty = parseInt(document.getElementById("qty").value, 10) || 1;

  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(qty) +
    "&projectId=" + encodeURIComponent(projectId) +
    "&user=" + encodeURIComponent(user);

  const img = new Image();
  img.src = url;

  document.getElementById("status").innerHTML =
    `<span class="ok">✔ ${itemId} (Qty: ${qty}) by ${user}</span>`;
}

/* =========================
   EXIT APP
========================= */
function exitApp() {

  try {
    if (html5QrCode) {
      html5QrCode.stop().then(() => {
        html5QrCode.clear();
      }).catch(() => {});
    }
  } catch (e) {}

  scanLock = false;
  lastScan = "";
  lastScanTime = 0;

  document.getElementById("reader").innerHTML = "";

  document.getElementById("status").innerText =
    "Scanner stopped. You may close the tab.";

  alert("Scanner exited. You can now close this tab.");
}

</script>

</body>
</html>
