<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Inventory Scanner (iPhone Stable)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#111827" />

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  body { font-family:-apple-system, Arial; margin:0; background:#f3f4f6; text-align:center; }
  header { background:#111827; color:white; padding:16px; font-size:20px; font-weight:800; }

  .container { padding:16px; }

  label { display:block; text-align:left; max-width:420px; margin:0 auto 6px; font-weight:800; }

  input {
    width:100%; max-width:420px; padding:14px;
    margin:0 auto 12px; border-radius:10px;
    border:1px solid #cbd5e1; font-size:16px;
    box-sizing:border-box;
  }

  .button-row {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    max-width:420px;
    margin:10px auto;
  }

  button {
    padding:14px;
    font-size:16px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:900;
  }

  #startBtn { background:#2563eb; }
  #exitBtn { background:#dc2626; }

  #reader {
    width:100%;
    max-width:420px;
    margin:0 auto;
    background:black;
    border-radius:14px;
    overflow:hidden;
    min-height:280px;
  }

  #toast {
    visibility:hidden;
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#111827;
    color:white;
    padding:12px 14px;
    border-radius:10px;
    opacity:0;
    transition:0.25s;
  }

  #toast.show { visibility:visible; opacity:1; }

  #confirmModal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
  }

  #confirmCard{
    width:min(420px, 92vw);
    background:white;
    border-radius:14px;
    padding:18px;
    text-align:left;
  }

  #confirmValue{
    font-family: monospace;
    background:#f3f4f6;
    padding:12px;
    border-radius:10px;
    word-break:break-word;
    margin-bottom:14px;
  }

  #confirmActions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  #confirmYesBtn { background:#16a34a; color:white; border:none; padding:14px; border-radius:12px; }
  #confirmNoBtn  { background:#dc2626; color:white; border:none; padding:14px; border-radius:12px; }
</style>
</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

<label>User</label>
<input id="user" autocomplete="off" />

<label>PO</label>
<input id="po" autocomplete="off" />

<label>Qty</label>
<input id="qty" type="number" value="1" min="1" />

<div class="button-row">
  <button id="startBtn">Start</button>
  <button id="exitBtn">Exit</button>
</div>

<div id="reader"></div>

</div>

<div id="toast"></div>

<!-- Confirm Modal -->
<div id="confirmModal">
  <div id="confirmCard">
    <h3>Confirm Scan</h3>
    <div id="confirmValue"></div>
    <div id="confirmActions">
      <button id="confirmYesBtn">Confirm</button>
      <button id="confirmNoBtn">Rescan</button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

let qr = null;
let scanning = false;
let scanLock = false;
let pending = null;

const userEl = document.getElementById("user");
const poEl = document.getElementById("po");
const qtyEl = document.getElementById("qty");

const toast = document.getElementById("toast");
const modal = document.getElementById("confirmModal");
const valueBox = document.getElementById("confirmValue");

function showToast(msg){
  toast.innerText = msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"), 2000);
}

function beep(){
  navigator.vibrate?.(80);
}

/* ---------- START CAMERA (ONCE ONLY) ---------- */
async function startCamera() {
  if (scanning) return;

  qr = qr || new Html5Qrcode("reader");

  const config = {
    fps: 12,
    qrbox: (w,h)=>{
      const m = Math.min(w,h);
      return { width: m*0.65, height: m*0.65 };
    },
    aspectRatio: 1.0
  };

  try {
    scanning = true;

    await qr.start(
      { facingMode: "environment" },
      config,
      onScan,
      () => {}
    );

    showToast("Camera started");
  } catch (e) {
    scanning = false;
    alert("Camera error: " + e.message);
  }
}

/* ---------- SCAN ---------- */
function onScan(decodedText) {
  if (scanLock) return;

  scanLock = true;
  pending = decodedText;

  valueBox.innerText = decodedText;
  modal.style.display = "flex";
}

/* ---------- CONFIRM ---------- */
document.getElementById("confirmYesBtn").onclick = async () => {
  modal.style.display = "none";
  await send(pending);

  pending = null;

  setTimeout(() => {
    scanLock = false;
  }, 400);
};

document.getElementById("confirmNoBtn").onclick = () => {
  modal.style.display = "none";
  pending = null;
  scanLock = false;
};

/* ---------- SEND ---------- */
async function send(itemId){
  const url = API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(qtyEl.value || 1) +
    "&po=" + encodeURIComponent(poEl.value || "") +
    "&user=" + encodeURIComponent(userEl.value || "");

  try {
    const r = await fetch(url);
    const d = await r.json();

    if (d.success) {
      showToast("✔ " + itemId);
      beep();
    } else {
      alert(d.error || "Error");
    }
  } catch (e) {
    alert("Network error: " + e.message);
  }
}

/* ---------- START / EXIT ---------- */
document.getElementById("startBtn").onclick = async () => {
  if (!userEl.value || !poEl.value) {
    alert("User and PO required");
    return;
  }

  await startCamera();
};

document.getElementById("exitBtn").onclick = async () => {
  try {
    if (qr && scanning) {
      await qr.stop();
      await qr.clear();
    }
  } catch(e) {}

  scanning = false;
  scanLock = false;
  pending = null;

  showToast("Camera stopped");
};
</script>

</body>
</html>
