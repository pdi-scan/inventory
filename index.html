<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Optional PWA bits -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111827" />

  <!-- html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family:-apple-system, Arial, sans-serif; margin:0; background:#f3f4f6; text-align:center; }
    header { background:#111827; color:white; padding:16px; font-size:20px; }

    .container { padding:16px; }

    label { display:block; text-align:left; max-width:420px; margin:0 auto 6px; font-weight:800; }

    input {
      width:100%; max-width:420px; padding:14px;
      margin:0 auto 12px; border-radius:10px; border:1px solid #cbd5e1;
      box-sizing:border-box; font-size:16px; background:white;
    }

    .button-row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:420px;
      margin:10px auto;
    }

    button {
      padding:14px;
      font-size:16px;
      border:none;
      border-radius:12px;
      color:white;
      font-weight:900;
      cursor:pointer;
    }
    button:disabled { opacity:0.6; cursor:not-allowed; }

    #startBtn { background:#2563eb; }
    #exitBtn  { background:#dc2626; }

    #torchBtn {
      width:100%;
      max-width:420px;
      margin:0 auto 10px;
      background:#111827;
      display:none;
    }

    #reader {
      width:100%;
      max-width:420px;
      margin:0 auto;
      background:black;
      border-radius:14px;
      overflow:hidden;
      position:relative;
      min-height:280px;
    }

    #focusRing {
      position:absolute;
      width:80px;
      height:80px;
      border:3px solid #facc15;
      border-radius:50%;
      pointer-events:none;
      transform:translate(-50%, -50%);
      opacity:0;
      transition:0.25s;
      z-index:10;
    }

    #toast {
      visibility:hidden;
      position:fixed;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:white;
      padding:12px 14px;
      border-radius:10px;
      opacity:0;
      transition:0.25s;
      z-index:9998;
      max-width:92vw;
    }
    #toast.show { visibility:visible; opacity:1; }

    /* Confirm modal */
    #confirmModal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.55);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }
    #confirmCard{
      width:min(420px, 92vw);
      background:white;
      border-radius:14px;
      padding:18px;
      text-align:left;
      box-shadow:0 12px 40px rgba(0,0,0,0.35);
    }
    #confirmTitle{
      font-size:18px;
      font-weight:900;
      margin-bottom:10px;
    }
    #confirmValue{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background:#f3f4f6;
      padding:12px;
      border-radius:10px;
      word-break:break-word;
      margin-bottom:14px;
    }
    #confirmActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    #confirmYesBtn{ background:#16a34a; color:white; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:900; }
    #confirmNoBtn { background:#dc2626; color:white; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:900; }

    /* Diagnostics box */
    #diag {
      max-width:420px;
      margin:10px auto 0;
      text-align:left;
      background:#fff;
      border:1px solid #e2e8f0;
      border-radius:12px;
      padding:12px;
      display:none;
      font-size:13px;
      color:#0f172a;
      white-space:pre-wrap;
      word-break:break-word;
    }
  </style>
</head>

<body>
<header>📦 PDI Scanner</header>

<div class="container">

  <label>Device/User</label>
  <input id="user" autocomplete="off" />

  <label>PO</label>
  <input id="po" autocomplete="off" />

  <label>Qty</label>
  <input id="qty" type="number" value="1" min="1" step="1" />

  <div class="button-row">
    <button id="startBtn" disabled>Start</button>
    <button id="exitBtn">Exit</button>
  </div>

  <button id="torchBtn" type="button">🔦 Torch</button>

  <div id="reader">
    <div id="focusRing"></div>
  </div>

  <div id="diag"></div>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<div id="toast"></div>

<!-- Confirm Modal -->
<div id="confirmModal" aria-modal="true" role="dialog">
  <div id="confirmCard">
    <div id="confirmTitle">Confirm Scan</div>
    <div id="confirmValue"></div>
    <div id="confirmActions">
      <button id="confirmYesBtn" type="button">Confirm</button>
      <button id="confirmNoBtn" type="button">Rescan</button>
    </div>
  </div>
</div>

<script>
/** =========================
 *  CONFIG
 *  ========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/** =========================
 *  DOM
 *  ========================= */
const userEl   = document.getElementById("user");
const poEl     = document.getElementById("po");
const qtyEl    = document.getElementById("qty");
const startBtn = document.getElementById("startBtn");
const exitBtn  = document.getElementById("exitBtn");

const reader   = document.getElementById("reader");
const ring     = document.getElementById("focusRing");

const torchBtn = document.getElementById("torchBtn");
const diagEl   = document.getElementById("diag");

const confirmModal  = document.getElementById("confirmModal");
const confirmValue  = document.getElementById("confirmValue");
const confirmYesBtn = document.getElementById("confirmYesBtn");
const confirmNoBtn  = document.getElementById("confirmNoBtn");

/** =========================
 *  STATE
 *  ========================= */
let qr = null;

let scanLock = false;
let lastScan = "";
let lastTime = 0;

let pendingScanText = null;
let isPaused = false;

let torchSupported = false;
let torchOn = false;

/**
 * Camera transition guard (mutex)
 * Prevents: "cannot transition to a new state, already under transition"
 */
let cameraOp = Promise.resolve();
let cameraBusy = false;

/** =========================
 *  UI HELPERS
 *  ========================= */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function showDiag(text) {
  diagEl.style.display = "block";
  diagEl.textContent = text;
}

function clearDiag() {
  diagEl.style.display = "none";
  diagEl.textContent = "";
}

function beep(){
  const a = document.getElementById("beep");
  a.currentTime = 0;
  a.play().catch(()=>{});
}

function openConfirm(text) {
  pendingScanText = text;
  confirmValue.textContent = text;
  confirmModal.style.display = "flex";
}

function closeConfirm() {
  confirmModal.style.display = "none";
}

function setCameraBusy(isBusy) {
  cameraBusy = isBusy;

  // Disable buttons that can cause camera transitions
  confirmYesBtn.disabled = isBusy;
  confirmNoBtn.disabled  = isBusy;

  // Start enabled only when fields set AND not busy
  startBtn.disabled = isBusy || !(userEl.value.trim() && poEl.value.trim());
}

/** Serialize all camera transitions */
function enqueueCameraOp(fn) {
  cameraOp = cameraOp
    .catch(() => {}) // keep queue alive
    .then(async () => {
      setCameraBusy(true);
      try {
        return await fn();
      } finally {
        setCameraBusy(false);
      }
    });
  return cameraOp;
}

/** =========================
 *  INPUT ENABLEMENT
 *  ========================= */
userEl.oninput = poEl.oninput = () => {
  if (!cameraBusy) startBtn.disabled = !(userEl.value.trim() && poEl.value.trim());
};

startBtn.addEventListener("click", () => startScanner());
exitBtn.addEventListener("click", () => exitApp());

/** =========================
 *  QRBOX (dynamic sizing)
 *  Supported as a function based on viewfinder dimensions.
 *  ========================= */
function qrboxSizing(viewfinderWidth, viewfinderHeight) {
  const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
  const size = Math.floor(minEdge * 0.65);
  return { width: size, height: size };
}

/** =========================
 *  SECURE CONTEXT CHECK
 *  ========================= */
function assertSecureContextOrExplain() {
  const isLocalhost = ["localhost", "127.0.0.1"].includes(location.hostname);
  if (location.protocol !== "https:" && !isLocalhost) {
    showDiag(
      "Camera access requires HTTPS (or localhost).\n\n" +
      `Current origin: ${location.origin}\n\n` +
      "Fix:\n- Host this page on https://\n- Or test on http://localhost\n"
    );
    alert("Camera requires HTTPS (or localhost).");
    return false;
  }
  return true;
}

/** =========================
 *  SAFE CAMERA OPS
 *  ========================= */
async function safeStop() {
  if (!qr) return;
  try {
    await qr.stop(); // stop() is async and must be awaited
  } catch (e) {
    // Ignore "already under transition" and similar state errors
    console.warn("stop() ignored:", e?.message || e);
  }
  try { qr.clear(); } catch (e) {}
}

function safePauseFreeze() {
  if (!qr) return;
  try {
    if (typeof qr.pause === "function") {
      qr.pause(true); // pause + freeze video frame
      isPaused = true;
    }
  } catch (e) {
    console.warn("pause() failed:", e?.message || e);
  }
}

function safeResume() {
  if (!qr) return;
  try {
    if (typeof qr.resume === "function") {
      qr.resume();
      isPaused = false;
    }
  } catch (e) {
    console.warn("resume() failed:", e?.message || e);
  }
}

/** =========================
 *  CAMERA TUNING: zoom/torch/focus/exposure where supported
 *  ========================= */
async function enableCameraTuning(){
  if (!qr) return;
  try {
    const caps = await qr.getRunningTrackCapabilities();

    torchSupported = !!caps.torch;
    torchBtn.style.display = torchSupported ? "block" : "none";

    const advanced = [];

    if (caps.zoom) {
      const targetZoom = Math.min(3, caps.zoom.max);
      advanced.push({ zoom: targetZoom });
    }

    if (torchSupported) {
      advanced.push({ torch: torchOn });
    }

    if (caps.focusMode) advanced.push({ focusMode: "continuous" });
    if (caps.exposureMode) advanced.push({ exposureMode: "continuous" });

    if (advanced.length) {
      await qr.applyVideoConstraints({ advanced });
    }
  } catch(e){
    // ignore unsupported capabilities
  }
}

torchBtn.addEventListener("click", () => {
  enqueueCameraOp(async () => {
    if (!torchSupported || !qr) return;
    torchOn = !torchOn;
    try {
      await qr.applyVideoConstraints({ advanced: [{ torch: torchOn }] });
      showToast(torchOn ? "Torch ON" : "Torch OFF");
    } catch (e) {
      torchOn = false;
      showToast("Torch not supported");
    }
  });
});

/** =========================
 *  TAP FEEDBACK (focus ring)
 *  ========================= */
reader.addEventListener("click", async (e) => {
  const rect = reader.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  ring.style.left = x + "px";
  ring.style.top = y + "px";
  ring.style.opacity = 1;
  setTimeout(() => ring.style.opacity = 0, 350);

  // Best-effort re-apply continuous focus if supported.
  // Must be called only while scanning is running.
  enqueueCameraOp(async () => {
    if (!qr || isPaused) return;
    try {
      await qr.applyVideoConstraints({ advanced: [{ focusMode: "continuous" }] });
    } catch (e) {}
  });
});

/** =========================
 *  START SCANNER (with fallbacks)
 *  ========================= */
function startScanner() {
  enqueueCameraOp(async () => {
    clearDiag();

    if (!assertSecureContextOrExplain()) return;

    if (!userEl.value.trim() || !poEl.value.trim()) {
      alert("User and PO required");
      return;
    }

    if (!qr) {
      qr = new Html5Qrcode("reader", {
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      });
    }

    // Ensure any prior run is fully stopped before starting again
    await safeStop();

    scanLock = false;
    pendingScanText = null;
    isPaused = false;

    const scanConfig = {
      fps: 12,
      qrbox: qrboxSizing,
      aspectRatio: 1.0,
      formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
    };

    // Fallback attempts: high-res back camera -> back camera -> first camera id
    const attempts = [
      {
        label: "Back camera + ideal 1080p",
        cam: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
      },
      {
        label: "Back camera (no resolution constraints)",
        cam: { facingMode: "environment" }
      }
    ];

    let cams = [];
    try { cams = await Html5Qrcode.getCameras(); } catch(e) {}
    if (cams && cams.length) attempts.push({ label: "First camera by deviceId", cam: cams[0].id });

    let lastErr = null;

    for (const a of attempts) {
      try {
        await qr.start(a.cam, scanConfig, onScanSuccess, () => {});
        await enableCameraTuning();
        showToast("Camera started");
        return;
      } catch (err) {
        lastErr = err;
      }
    }

    const errName = lastErr?.name || "Error";
    const errMsg  = lastErr?.message || String(lastErr || "");
    showDiag(
      "Camera start failed after multiple attempts.\n\n" +
      `${errName}: ${errMsg}\n\n` +
      "Common fixes:\n" +
      "- Allow camera permissions for this site\n" +
      "- Close other apps using camera (Zoom/Meet/Camera)\n" +
      "- Try opening in Safari/Chrome (not an in-app browser)\n"
    );
    alert(`Camera failed.\n\n${errName}: ${errMsg}`);
  });
}

/** =========================
 *  SCAN CALLBACK (scan -> pause -> confirm)
 *  ========================= */
function onScanSuccess(decodedText) {
  enqueueCameraOp(async () => {
    const now = Date.now();

    if (scanLock) return;
    if (decodedText === lastScan && now - lastTime < 2000) return;

    scanLock = true;
    lastScan = decodedText;
    lastTime = now;

    // Pause/freeze, then ask to confirm
    safePauseFreeze();
    openConfirm(decodedText);
  });
}

/** Confirm / Rescan */
confirmYesBtn.addEventListener("click", () => {
  enqueueCameraOp(async () => {
    if (!pendingScanText) return;

    closeConfirm();
    const toSend = pendingScanText;
    pendingScanText = null;

    await send(toSend);

    // Small cooldown to avoid immediate same-code re-hit
    await new Promise(r => setTimeout(r, 700));
    scanLock = false;
    safeResume();
  });
});

confirmNoBtn.addEventListener("click", () => {
  enqueueCameraOp(async () => {
    closeConfirm();
    pendingScanText = null;
    scanLock = false;
    safeResume();
  });
});

/** =========================
 *  SEND
 *  ========================= */
async function send(itemId){
  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(qtyEl.value || 1) +
    "&po=" + encodeURIComponent(poEl.value || "") +
    "&user=" + encodeURIComponent(userEl.value || "");

  try {
    const r = await fetch(url);
    const d = await r.json();

    if (d.success) {
      showToast("✔ " + itemId);
      if (navigator.vibrate) navigator.vibrate(100);
      beep();
    } else {
      alert(d.error || "Unknown error");
    }
  } catch (e) {
    alert("Network error: " + e.message);
  }
}

/** =========================
 *  EXIT
 *  ========================= */
function exitApp() {
  enqueueCameraOp(async () => {
    closeConfirm();
    pendingScanText = null;
    scanLock = false;
    isPaused = false;
    torchOn = false;
    torchBtn.style.display = "none";

    await safeStop();
    showToast("Camera stopped");
  });
}
</script>
</body>
</html>
