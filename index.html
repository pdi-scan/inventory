<!DOCTYPE html>
<html>
<head>
  <title>PDI Scanner v</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family:-apple-system,Arial; margin:0; background:#f3f4f6; text-align:center; }
    header { background:#111827; color:white; padding:16px; font-size:20px; }

    .container { padding:16px; }

    label { display:block; text-align:left; max-width:420px; margin:0 auto 4px; font-weight:600; }

    input {
      width:100%; max-width:420px; padding:14px;
      margin-bottom:10px; border-radius:8px; border:1px solid #ccc;
    }

    #reader {
      width:100%;
      max-width:420px;
      margin:auto;
      background:black;
      border-radius:12px;
      overflow:hidden;
    }

    .button-row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:420px;
      margin:10px auto;
    }

    button {
      padding:16px;
      font-size:18px;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:bold;
    }

    #startBtn { background:#2563eb; }
    #exitBtn  { background:#dc2626; }

    #toast {
      visibility:hidden;
      position:fixed;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:white;
      padding:14px;
      border-radius:8px;
      opacity:0;
      transition:0.3s;
    }

    #toast.show { visibility:visible; opacity:1; }
  </style>
</head>

<body>

<header>📦 PDI Scanner</header>

<div class="container">

  <label>Device/User</label>
  <input id="user" placeholder="Enter name">

  <label>PO</label>
  <input id="po" placeholder="Enter PO">

  <label>Qty</label>
  <input id="qty" type="number" value="1">

  <div class="button-row">
    <button id="startBtn" onclick="startScanner()" disabled>Start</button>
    <button onclick="exitApp()">Exit</button>
  </div>

  <div id="reader"></div>

</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<div id="toast"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

let qr, scanLock=false, lastScan="", lastTime=0;

const userEl = document.getElementById("user");
const poEl = document.getElementById("po");
const qtyEl = document.getElementById("qty");
const startBtn = document.getElementById("startBtn");

userEl.oninput = poEl.oninput = () => {
  startBtn.disabled = !(userEl.value.trim() && poEl.value.trim());
};

/* TOAST */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* SOUND */
function beep(){
  const a=document.getElementById("beep");
  a.currentTime=0;
  a.play().catch(()=>{});
}

/* START SCANNER (SAFE + OPTIMIZED) */
function startScanner(){

  if (!userEl.value.trim() || !poEl.value.trim()) {
    alert("User and PO required");
    return;
  }

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: { exact: "environment" } }, // 🔥 reliable back camera
    {
      fps: 20,
      qrbox: { width: 180, height: 180 },
      aspectRatio: 1.0,
      formatsToSupport: [
        Html5QrcodeSupportedFormats.QR_CODE
      ]
    },
    onScan,
    (err) => console.log("Scan error:", err)
  ).catch(err => {
    console.error("Camera start failed:", err);
    alert("Camera failed. Check permissions or reload.");
  });
}

/* SCAN */
function onScan(text){

  const now=Date.now();

  if(scanLock) return;
  if(text===lastScan && now-lastTime<2000) return;

  scanLock=true;
  lastScan=text;
  lastTime=now;

  qr.stop().then(()=>{
    send(text);
    setTimeout(()=>{
      scanLock=false;
      startScanner();
    },1200);
  });
}

/* SEND */
function send(itemId){

  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(qtyEl.value) +
    "&po=" + encodeURIComponent(poEl.value) +
    "&user=" + encodeURIComponent(userEl.value);

  fetch(url)
    .then(r=>r.json())
    .then(d=>{
      if(d.success){
        showToast("✔ "+itemId);

        if(navigator.vibrate) navigator.vibrate(100);

        beep();
      } else {
        alert(d.error);
      }
    })
    .catch(e=>alert("Network error: " + e.message));
}

/* EXIT */
function exitApp(){
  if(qr){
    qr.stop().catch(()=>{});
    qr.clear().catch(()=>{});
  }
}

</script>

</body>
</html>
