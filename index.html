<!DOCTYPE html>
<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, Arial;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
    }

    input {
      width: 100%;
      max-width: 420px;
      padding: 14px;
      font-size: 16px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: auto;
      border-radius: 12px;
      overflow: hidden;
      background: black;
    }

    button {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      font-size: 18px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    button:disabled {
      background: #9ca3af;
    }

    #status {
      margin-top: 20px;
      padding: 12px;
      background: white;
      border-radius: 8px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      font-size: 16px;
    }

    .ok { color: green; font-weight: bold; }
  </style>
</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

  <input id="projectId" type="text" placeholder="Enter Project ID">

  <button id="startBtn" onclick="startScanner()" disabled>
    📷 Start Scanner
  </button>

  <div id="reader"></div>

  <div id="status">Enter Project ID to begin</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

let html5QrCode;
let scanLock = false;

// Enable button only when project ID exists
document.getElementById("projectId").addEventListener("input", function () {
  document.getElementById("startBtn").disabled = this.value.trim().length === 0;
});

function startScanner() {

  const projectId = document.getElementById("projectId").value.trim();

  if (!projectId) {
    alert("Enter Project ID first");
    return;
  }

  document.getElementById("status").innerText =
    "Project: " + projectId + " | Starting scanner...";

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: 250 },
    onScanSuccess
  );
}

function onScanSuccess(decodedText) {

  if (scanLock) return;

  const itemId = (decodedText || "").toString().trim();

  if (!itemId || itemId === "undefined") return;

  scanLock = true;

  html5QrCode.stop().then(() => {

    document.getElementById("status").innerText =
      "Scanned: " + itemId;

    sendToAPI(itemId);

    setTimeout(() => {
      scanLock = false;
      startScanner();
    }, 1200);

  });
}

function sendToAPI(itemId) {

  // 🔥 ALWAYS READ CURRENT VALUE (fixes missing project bug)
  const projectId = document.getElementById("projectId").value.trim();

  if (!projectId) {
    document.getElementById("status").innerText =
      "ERROR: Missing Project ID";
    return;
  }

  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=1" +
    "&projectId=" + encodeURIComponent(projectId);

  const img = new Image();
  img.src = url;

  document.getElementById("status").innerHTML =
    `<span class="ok">✔ Sent: ${itemId}</span>`;
}

</script>

</body>
</html>
