<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse ZXing Scanner</title>

<!-- LOCAL ZXING (NO CDN) -->
<script src="./js/zxing.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, Arial;
  background:#111;
  color:white;
  text-align:center;
}

header {
  background:#000;
  padding:12px;
  font-weight:800;
}

video {
  width:100%;
  max-width:420px;
  margin-top:10px;
  border-radius:12px;
  background:black;
}

input {
  width:90%;
  max-width:420px;
  padding:12px;
  margin:6px auto;
  border-radius:8px;
  border:none;
  display:block;
}

button {
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-weight:800;
}

#status {
  margin-top:10px;
  font-weight:700;
}
</style>
</head>

<body>

<header>📦 Warehouse Scanner</header>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1" min="1">

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<video id="video" autoplay playsinline muted></video>

<div id="status"></div>

<script>
/* =========================
   CHECK ZXING LOADED
========================= */
if (!window.ZXing) {
  alert("ZXing failed to load. Check local file path: ./js/zxing.min.js");
}

const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

let reader = null;
let stream = null;

let lastScan = "";
let lastTime = 0;
let scanLock = false;

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

function setStatus(msg){
  statusEl.innerText = msg;
}

/* =========================
   CAMERA PERMISSION UNLOCK
========================= */
async function unlockCamera(){
  const tempStream = await navigator.mediaDevices.getUserMedia({
    video: true
  });
  tempStream.getTracks().forEach(t => t.stop());
}

/* =========================
   START SCANNER
========================= */
async function startScanner(){
  try {
    video.setAttribute("playsinline", true);
    video.muted = true;

    await unlockCamera();

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    /* IMPORTANT: correct ZXing global */
    reader = new ZXing.BrowserMultiFormatReader();

    reader.decodeFromVideoElementContinuously(video, (result) => {
      if (!result) return;

      const now = Date.now();
      const text = result.getText();

      if (scanLock) return;
      if (text === lastScan && now - lastTime < 800) return;

      scanLock = true;
      lastScan = text;
      lastTime = now;

      handleScan(text);

      setTimeout(() => scanLock = false, 400);
    });

    setStatus("Scanner ready");
  } catch (e) {
    console.error(e);
    alert("Camera error: " + e.message);
  }
}

/* =========================
   HANDLE SCAN
========================= */
function handleScan(text){
  text = text.trim();

  if (confirm("Scanned:\n" + text)) {
    send(text);
  }
}

/* =========================
   SEND TO API
========================= */
async function send(itemId){
  setStatus("Sending...");

  const url = API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(document.getElementById("qty").value) +
    "&po=" + encodeURIComponent(document.getElementById("po").value) +
    "&user=" + encodeURIComponent(document.getElementById("user").value);

  try {
    const r = await fetch(url);
    const d = await r.json();

    if (d.success){
      setStatus("✔ " + itemId);
      navigator.vibrate?.(80);
    } else {
      setStatus("❌ " + (d.error || "Error"));
    }
  } catch (e) {
    setStatus("Network error");
  }
}

/* =========================
   STOP SCANNER
========================= */
function stopScanner(){
  try {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
  } catch(e){}

  reader = null;
  stream = null;

  setStatus("Stopped");
}

/* =========================
   BUTTONS
========================= */
document.getElementById("startBtn").onclick = startScanner;
document.getElementById("stopBtn").onclick = stopScanner;
</script>

</body>
</html>
