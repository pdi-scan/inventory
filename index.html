<!DOCTYPE html>

<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FIXED ZXING LIBRARY -->

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body {
      font-family: -apple-system, Arial;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
    }

    video {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      background: black;
    }

    button {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      font-size: 18px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    #status {
      margin-top: 20px;
      padding: 12px;
      background: white;
      border-radius: 8px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
  </style>

</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

<video id="video" autoplay playsinline muted></video>

<button onclick="startScanner()">📷 Start Scanner</button>

  <div id="status">Tap “Start Scanner”</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwbYo7Sms6IetRxosD0zKER4TgGWSNv9ip4nStnlcbIrlIcNtFYqvr61FJNy55riprZ/exec";

let codeReader;
let scanning = false;

async function startScanner() {

  if (scanning) return;
  scanning = true;

  document.getElementById("status").innerText = "Requesting camera...";

  try {

    // Step 1: get camera permission
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;

    document.getElementById("status").innerText = "Camera started";

    // Step 2: initialize ZXing AFTER camera is active
    codeReader = new ZXing.BrowserMultiFormatReader();

    codeReader.decodeFromVideoElement(video, (result, err) => {

      if (result) {

        const text = result.text;

        document.getElementById("status").innerText =
          "Scanned: " + text;

        codeReader.reset();

        sendToAPI(text);
      }

    });

  } catch (err) {
    document.getElementById("status").innerText =
      "Camera error: " + err.message;
  }
}

function sendToAPI(itemId) {

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      itemId: itemId,
      qty: 1
    })
  })
  .then(res => res.json())
  .then(data => {

    document.getElementById("status").innerHTML =
      `<span class="success">
        ✔ ${data.itemId}<br>
        Remaining: ${data.remaining}
      </span>`;

    setTimeout(() => {
      scanning = false;
      startScanner();
    }, 1500);

  })
  .catch(err => {
    document.getElementById("status").innerHTML =
      `<span class="error">${err.message}</span>`;
  });
}

</script>

</body>
</html>
