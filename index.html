<!DOCTYPE html>
<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, Arial;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container { padding: 16px; }

    label {
      display:block;
      text-align:left;
      max-width:420px;
      margin:0 auto 4px;
      font-size:14px;
      font-weight:600;
    }

    input {
      width:100%;
      max-width:420px;
      padding:14px;
      font-size:16px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    #reader {
      width:100%;
      max-width:420px;
      margin:auto;
      border-radius:12px;
      overflow:hidden;
      background:black;
    }

    .button-row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:420px;
      margin:10px auto;
    }

    button {
      padding:16px;
      font-size:18px;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:bold;
    }

    #startBtn { background:#2563eb; }
    #exitBtn { background:#dc2626; }

    #status {
      margin-top:20px;
      padding:12px;
      background:white;
      border-radius:8px;
      max-width:420px;
      margin:auto;
    }
  </style>
</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

  <label>User</label>
  <input id="user" placeholder="Enter name">

  <label>Project ID</label>
  <input id="projectId" placeholder="Project ID">

  <label>Qty</label>
  <input id="qty" type="number" value="1">

  <div class="button-row">
    <button id="startBtn" onclick="startScanner()" disabled>Start</button>
    <button id="exitBtn" onclick="exitApp()">Exit</button>
  </div>

  <div id="reader"></div>
  <div id="status">Ready</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

let qr;
let lock = false;
let last = "";
let lastTime = 0;

/* ================= PWA REGISTER ================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

/* ================= READY CHECK ================= */
document.getElementById("user").oninput =
document.getElementById("projectId").oninput = check;

function check() {
  const u = user.value.trim();
  const p = projectId.value.trim();
  startBtn.disabled = !(u && p);
}

/* ================= START SCANNER ================= */
function startScanner() {

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: 250 },
    onScan
  );
}

/* ================= SCAN ================= */
function onScan(text) {

  const now = Date.now();
  const item = text.trim();

  if (lock) return;
  if (item === last && now - lastTime < 2000) return;

  lock = true;
  last = item;
  lastTime = now;

  qr.stop().then(() => {

    send(item);

    setTimeout(() => {
      lock = false;
      startScanner();
    }, 1200);

  });
}

/* ================= SEND ================= */
function send(item) {

  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(item) +
    "&qty=" + qty.value +
    "&projectId=" + projectId.value +
    "&user=" + user.value;

  new Image().src = url;

  status.innerText = "Scanned: " + item;
}

/* ================= EXIT ================= */
function exitApp() {

  if (qr) {
    qr.stop().catch(()=>{});
    qr.clear().catch(()=>{});
  }

  lock = false;
  last = "";

  reader.innerHTML = "";
  status.innerText = "Stopped (close tab or Home Screen app)";
}

</script>

</body>
</html>
