<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Scanner (Fixed Loop)</title>

<script src="./js/zxing.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, Arial;
  background:#111;
  color:white;
  text-align:center;
}

header {
  padding:12px;
  font-weight:800;
  background:#000;
}

video {
  width:100%;
  max-width:420px;
  margin-top:10px;
  border-radius:12px;
  background:black;
}

input {
  width:90%;
  max-width:420px;
  padding:12px;
  margin:6px auto;
  border-radius:8px;
  border:none;
  display:block;
}

button {
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-weight:800;
}

#status {
  margin-top:10px;
  font-weight:700;
}
</style>
</head>

<body>

<header>📦 Warehouse Scanner 1</header>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1" min="1">

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<video id="video" autoplay playsinline muted></video>

<div id="status"></div>

<script>
/* =========================
   SAFETY CHECK
========================= */
if (!window.ZXing) {
  alert("ZXing failed to load");
}

const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

let reader = null;
let stream = null;

/* =========================
   SCAN STATE (CRITICAL FIX)
========================= */
let scanLocked = false;
let lastScan = "";
let lastTime = 0;
let seenActiveCode = null;

/* =========================
   UI
========================= */
const video = document.getElementById("video");
const statusEl = document.getElementById("status");

function setStatus(msg){
  statusEl.innerText = msg;
}

/* =========================
   CAMERA UNLOCK (iOS FIX)
========================= */
async function unlockCamera(){
  const temp = await navigator.mediaDevices.getUserMedia({ video:true });
  temp.getTracks().forEach(t => t.stop());
}

/* =========================
   START SCANNER
========================= */
async function startScanner(){
  try {
    video.setAttribute("playsinline", true);
    video.muted = true;

    await unlockCamera();

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    reader = new ZXing.BrowserMultiFormatReader();

    reader.decodeFromVideoElementContinuously(video, (result) => {
      if (!result) return;

      const text = result.getText().trim();
      const now = Date.now();

      /* =========================
         HARD GUARD (FIX LOOP BUG)
      ========================= */

      // 1. Already processing scan → IGNORE EVERYTHING
      if (scanLocked) return;

      // 2. Same scan within short window → IGNORE
      if (text === lastScan && now - lastTime < 2000) return;

      // 3. Lock immediately (IMPORTANT: before UI)
      scanLocked = true;
      lastScan = text;
      lastTime = now;
      seenActiveCode = text;

      handleScan(text);
    });

    setStatus("Ready");
  } catch(e){
    console.error(e);
    alert("Camera error: " + e.message);
  }
}

/* =========================
   HANDLE SCAN
========================= */
function handleScan(text){
  if (confirm("Scanned:\n" + text)) {
    send(text);
  }

  // IMPORTANT: unlock AFTER user finishes interacting
  unlockScanAfterDelay();
}

/* =========================
   UNLOCK LOGIC (KEY FIX)
========================= */
function unlockScanAfterDelay(){
  setTimeout(() => {
    scanLocked = false;
    seenActiveCode = null;
  }, 1200); // ensures QR has physically left frame
}

/* =========================
   SEND
========================= */
async function send(itemId){
  setStatus("Sending...");

  const url = API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(document.getElementById("qty").value) +
    "&po=" + encodeURIComponent(document.getElementById("po").value) +
    "&user=" + encodeURIComponent(document.getElementById("user").value);

  try {
    const r = await fetch(url);
    const d = await r.json();

    if (d.success){
      setStatus("✔ " + itemId);
      navigator.vibrate?.(80);
    } else {
      setStatus("❌ " + (d.error || "Error"));
    }
  } catch(e){
    setStatus("Network error");
  }
}

/* =========================
   STOP SCANNER
========================= */
function stopScanner(){
  try {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
  } catch(e){}

  reader = null;
  stream = null;
  scanLocked = false;

  setStatus("Stopped");
}

/* =========================
   BUTTONS
========================= */
document.getElementById("startBtn").onclick = startScanner;
document.getElementById("stopBtn").onclick = stopScanner;
</script>

</body>
</html>
