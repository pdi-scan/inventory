<!DOCTYPE html>
<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family:-apple-system,Arial; margin:0; background:#f3f4f6; text-align:center; }
    header { background:#111827; color:white; padding:16px; font-size:20px; }

    .container { padding:16px; }

    input {
      width:100%; max-width:420px; padding:14px;
      margin-bottom:10px; border-radius:8px; border:1px solid #ccc;
    }

    #reader {
      width:100%;
      max-width:420px;
      margin:auto;
      background:black;
      border-radius:12px;
      position:relative;
    }

    #focusRing {
      position:absolute;
      width:80px;
      height:80px;
      border:3px solid yellow;
      border-radius:50%;
      transform:translate(-50%,-50%);
      opacity:0;
      transition:0.3s;
    }

    button {
      padding:16px;
      margin:5px;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:bold;
    }

    #startBtn { background:#2563eb; }
    #exitBtn { background:#dc2626; }

    #toast {
      position:fixed;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:white;
      padding:12px;
      border-radius:8px;
      opacity:0;
      transition:0.3s;
    }

    #toast.show { opacity:1; }
  </style>
</head>

<body>

<header>📦 Scanner</header>

<div class="container">
  <input id="user" placeholder="User">
  <input id="po" placeholder="PO">
  <button id="startBtn" onclick="startScanner()">Start</button>
  <button id="exitBtn" onclick="exitApp()">Exit</button>

  <div id="reader">
    <div id="focusRing"></div>
  </div>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<div id="toast"></div>

<script>

let qr;
let scanLock=false, lastScan="", lastTime=0;

const reader = document.getElementById("reader");
const ring = document.getElementById("focusRing");

/* START SCANNER */
function startScanner(){

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: { exact: "environment" } },
    {
      fps: 25,
      qrbox: { width: 140, height: 140 }, // 🔥 smaller = better for small QR
      aspectRatio: 1.0,
      formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
    },
    onScan
  ).then(enableZoom).catch(err=>{
    alert("Camera failed: " + err);
  });
}

/* SAFE ZOOM (POST START) */
async function enableZoom(){
  try {
    const caps = await qr.getRunningTrackCapabilities();
    if (caps.zoom) {
      await qr.applyVideoConstraints({
        advanced: [{ zoom: Math.min(2, caps.zoom.max) }]
      });
    }
  } catch(e){}
}

/* TAP TO FOCUS */
reader.addEventListener("click", async (e) => {

  const rect = reader.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  ring.style.left = x + "px";
  ring.style.top = y + "px";
  ring.style.opacity = 1;
  setTimeout(()=> ring.style.opacity = 0, 400);

  try {
    await qr.applyVideoConstraints({
      advanced: [{ focusMode: "continuous" }]
    });
  } catch (err) {

    // 🔥 iPhone fallback (restart camera with delay)
    try {
      await qr.stop();
      await new Promise(r => setTimeout(r, 300));
      await startScanner();
    } catch(e){}
  }

});

/* SCAN */
function onScan(text){

  const now=Date.now();
  if(scanLock) return;
  if(text===lastScan && now-lastTime<2000) return;

  scanLock=true;
  lastScan=text;
  lastTime=now;

  qr.stop().then(()=>{
    showToast("✔ " + text);
    beep();

    setTimeout(()=>{
      scanLock=false;
      startScanner();
    },1800); // 🔥 longer delay = better refocus
  });
}

/* UI */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function beep(){
  const a=document.getElementById("beep");
  a.currentTime=0;
  a.play().catch(()=>{});
}

function exitApp(){
  if(qr){
    qr.stop().catch(()=>{});
    qr.clear().catch(()=>{});
  }
}

</script>

</body>
</html>
