<!DOCTYPE html>
<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, Arial;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container { padding: 16px; }

    label {
      display:block;
      text-align:left;
      max-width:420px;
      margin:0 auto 4px;
      font-weight:600;
    }

    input {
      width:100%;
      max-width:420px;
      padding:14px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    #reader {
      width:100%;
      max-width:420px;
      margin:auto;
      background:black;
      border-radius:12px;
    }

    .button-row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:420px;
      margin:10px auto;
    }

    button {
      padding:16px;
      font-size:18px;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:bold;
    }

    #startBtn { background:#2563eb; }
    #exitBtn { background:#dc2626; }

    #status {
      margin-top:20px;
      background:white;
      padding:12px;
      border-radius:8px;
      max-width:420px;
      margin:auto;
    }
  </style>
</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

  <label>User</label>
  <input id="user" placeholder="Enter name">

  <label>Project ID</label>
  <input id="projectId" placeholder="Project ID">

  <label>Qty</label>
  <input id="qty" type="number" value="1">

  <div class="button-row">
    <button id="startBtn" onclick="startScanner()" disabled>Start</button>
    <button id="exitBtn" onclick="exitApp()">Exit</button>
  </div>

  <div id="reader"></div>
  <div id="status">Ready</div>

</div>

<script>

/* =========================
   🔥 DEBUG ALERT (VERSION CHECK)
========================= */
alert("NEW VERSION LOADED");

/* =========================
   🔥 GLOBAL ERROR CATCHER
========================= */
window.onerror = function(msg, url, line) {
  alert("JS ERROR: " + msg + " @ line " + line);
};

/* =========================
   🔧 SET YOUR REAL URL
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* =========================
   STATE
========================= */
let qr;
let scanLock = false;
let lastScan = "";
let lastScanTime = 0;

/* =========================
   REGISTER SERVICE WORKER
========================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

/* =========================
   READY CHECK
========================= */
user.oninput = projectId.oninput = () => {
  startBtn.disabled = !(user.value.trim() && projectId.value.trim());
};

/* =========================
   START SCANNER
========================= */
function startScanner() {

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: 250 },
    onScanSuccess
  );
}

/* =========================
   SCAN
========================= */
function onScanSuccess(text) {

  const now = Date.now();
  const item = text.trim();

  if (!item) return;
  if (scanLock) return;
  if (item === lastScan && (now - lastScanTime) < 2000) return;

  scanLock = true;
  lastScan = item;
  lastScanTime = now;

  qr.stop().then(() => {

    sendToAPI(item);

    setTimeout(() => {
      scanLock = false;
      startScanner();
    }, 1200);

  });
}

/* =========================
   SEND TO APPS SCRIPT
========================= */
function sendToAPI(itemId) {

  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(qty.value) +
    "&projectId=" + encodeURIComponent(projectId.value) +
    "&user=" + encodeURIComponent(user.value);

  alert("Sending: " + itemId); // 🔥 DEBUG

  fetch(url, {
    method: "GET",
    cache: "no-store"
  })
  .then(res => res.text())
  .then(data => {
    alert("Response received"); // 🔥 DEBUG
    status.innerText = "✔ " + itemId;
  })
  .catch(err => {
    alert("ERROR: " + err.message);
  });
}

/* =========================
   EXIT
========================= */
function exitApp() {

  if (qr) {
    qr.stop().catch(()=>{});
    qr.clear().catch(()=>{});
  }

  scanLock = false;
  lastScan = "";

  reader.innerHTML = "";
  status.innerText = "Stopped";
}

</script>

</body>
</html>
