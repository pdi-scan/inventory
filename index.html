<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop-Free Scanner</title>

<script src="./js/zxing.min.js"></script>

<style>
body { margin:0; font-family:-apple-system; background:#111; color:white; text-align:center; }
header { padding:12px; font-weight:800; background:#000; }
video { width:100%; max-width:420px; border-radius:12px; margin-top:10px; }
button { padding:12px; margin:6px; font-weight:800; border:none; border-radius:10px; }
#status { margin-top:10px; }
</style>
</head>

<body>

<header>📦 Loop-Free Scanner</header>

<button onclick="startScanner()">Start</button>
<button onclick="stopScanner()">Stop</button>

<video id="video" autoplay playsinline muted></video>

<div id="status"></div>

<script>
if (!window.ZXing) alert("ZXing not loaded");

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

let reader;
let stream;

let scanning = false;
let locked = false;
let lastCode = null;
let lastSeen = 0;

const RESET_MS = 1500;

/* =========================
   CAMERA
========================= */
async function startScanner(){
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  reader = new ZXing.BrowserMultiFormatReader();

  scanning = true;
  loopScan();

  setStatus("Running");
}

/* =========================
   MANUAL SCAN LOOP (KEY FIX)
========================= */
async function loopScan(){
  if (!scanning) return;

  try {
    const result = await reader.decodeOnceFromVideoDevice(undefined, video);

    if (result) {
      const text = result.getText().trim();
      const now = Date.now();

      if (!locked || (text !== lastCode)) {
        locked = true;
        lastCode = text;
        lastSeen = now;

        handleScan(text);
      }
    }
  } catch(e) {
    // ignore decode errors
  }

  requestAnimationFrame(loopScan);
}

/* =========================
   SCAN HANDLER
========================= */
function handleScan(text){
  setStatus("Scanned: " + text);

  if (confirm(text)) {
    console.log("SEND:", text);
  }

  // unlock ONLY after QR disappears for long enough
  setTimeout(() => {
    locked = false;
  }, RESET_MS);
}

/* =========================
   STOP
========================= */
function stopScanner(){
  scanning = false;

  if (stream) stream.getTracks().forEach(t => t.stop());

  setStatus("Stopped");
}

/* =========================
   UI
========================= */
function setStatus(msg){
  statusEl.innerText = msg;
}
</script>

</body>
</html>
