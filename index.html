<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse Scanner</title>

<script src="./js/zxing.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#111;
  color:white;
  text-align:center;
}

header {
  padding:12px;
  font-weight:800;
  background:#000;
}

video {
  width:100%;
  max-width:420px;
  border-radius:12px;
  margin-top:10px;
  background:black;
}

#frame {
  position:relative;
  display:inline-block;
}

#box {
  position:absolute;
  inset:18%;
  border:3px solid rgba(0,255,0,0.7);
  border-radius:10px;
  pointer-events:none;
}

input, button {
  width:90%;
  max-width:420px;
  padding:12px;
  margin:6px auto;
  border-radius:8px;
  border:none;
  font-weight:700;
}

button:disabled {
  opacity:0.5;
}

/* TOAST */
#toast {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#111827;
  color:white;
  padding:12px 16px;
  border-radius:10px;
  font-weight:700;
  opacity:0;
  transition:0.25s;
  z-index:9999;
  max-width:90%;
}

#toast.show {
  opacity:1;
}

/* HUD */
#hud {
  position:fixed;
  top:10px;
  right:10px;
  background:#111827;
  padding:8px 12px;
  border-radius:10px;
  font-size:14px;
  display:flex;
  align-items:center;
  gap:8px;
  z-index:9999;
}

#syncBtn {
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
  border:none;
  background:#2563eb;
  color:white;
  font-weight:700;
}
</style>
</head>

<body>

<header>📦 Warehouse Scanner</header>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1" min="1">

<button id="startBtn" onclick="startScanner()" disabled>Start</button>
<button onclick="stopScanner()">Stop</button>

<div id="frame">
  <video id="video" autoplay playsinline muted></video>
  <div id="box"></div>
</div>

<!-- HUD -->
<div id="hud">
  📦 Pending: <span id="queueCount">0</span>
  <button id="syncBtn" onclick="flushQueue()">Sync</button>
</div>

<div id="toast"></div>

<script>
/* =========================
   CONFIG
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* =========================
   DOM
========================= */
const userEl = document.getElementById("user");
const poEl   = document.getElementById("po");
const qtyEl  = document.getElementById("qty");
const startBtn = document.getElementById("startBtn");

/* =========================
   START BUTTON GATE
========================= */
function updateStartState(){
  startBtn.disabled = !(userEl.value.trim() && poEl.value.trim());
}
userEl.addEventListener("input", updateStartState);
poEl.addEventListener("input", updateStartState);
updateStartState();

/* =========================
   TOAST + VIBRATION
========================= */
function showToast(msg, type="normal"){
  const t = document.getElementById("toast");
  t.innerText = msg;

  t.style.background =
    type === "error" ? "#dc2626" :
    type === "success" ? "#16a34a" :
    "#111827";

  t.classList.add("show");

  setTimeout(() => t.classList.remove("show"), 1800);

  if (navigator.vibrate) navigator.vibrate(80);
}

/* =========================
   STATE
========================= */
let stream = null;
let reader = null;

let scanning = false;
let locked = false;
let shuttingDown = false;

let lastCode = "";
const RESET_MS = 1200;

/* =========================
   OFFLINE QUEUE
========================= */
let queue = JSON.parse(localStorage.getItem("scanQueue") || "[]");

function saveQueue(){
  localStorage.setItem("scanQueue", JSON.stringify(queue));
  updateQueueUI();
}

function updateQueueUI(){
  document.getElementById("queueCount").innerText = queue.length;
}
updateQueueUI();

/* =========================
   START SCANNER
========================= */
async function startScanner(){

  if (!userEl.value.trim() || !poEl.value.trim()) {
    showToast("User and PO required", "error");
    return;
  }

  scanning = true;
  shuttingDown = false;

  flushQueue();

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
  } catch(e){
    showToast("Camera denied", "error");
    return;
  }

  document.getElementById("video").srcObject = stream;

  reader = new ZXing.BrowserMultiFormatReader();

  scanLoop();
}

/* =========================
   SCAN LOOP
========================= */
async function scanLoop(){
  if (!scanning) return;

  try {
    const video = document.getElementById("video");

    if (video.readyState === 4 && !locked) {

      const result = await reader.decodeOnceFromVideoDevice(undefined, video);

      if (result) {
        const text = result.getText().trim();

        if (shuttingDown) return;

        if (text !== lastCode) {
          locked = true;
          lastCode = text;

          handleScan(text);

          setTimeout(() => locked = false, RESET_MS);
        }
      }
    }

  } catch(e) {}

  if (scanning) requestAnimationFrame(scanLoop);
}

/* =========================
   HANDLE SCAN
========================= */
function handleScan(text){
  showToast("Scanned: " + text);
  send(text);
}

/* =========================
   SEND (DEDUP ENABLED SERVER SIDE)
========================= */
async function send(itemId){

  const payload = {
    scanId: crypto.randomUUID(),   // 🔐 server dedupe key
    itemId,
    qty: qtyEl.value || 1,
    po: poEl.value || "",
    user: userEl.value || "",
    ts: Date.now()
  };

  const url =
    API_URL +
    "?scanId=" + encodeURIComponent(payload.scanId) +
    "&itemId=" + encodeURIComponent(payload.itemId) +
    "&qty=" + encodeURIComponent(payload.qty) +
    "&po=" + encodeURIComponent(payload.po) +
    "&user=" + encodeURIComponent(payload.user);

  try {
    const r = await fetch(url);
    const d = JSON.parse(await r.text());

    if (d.success) {
      showToast("✔ " + itemId + " (Remain: " + d.remaining + ")", "success");
    } else {
      throw new Error();
    }

  } catch(e){

    queue.push(payload);
    saveQueue();

    showToast("📦 Saved offline (" + queue.length + ")", "error");
  }
}

/* =========================
   FLUSH QUEUE
========================= */
async function flushQueue(){

  if (!navigator.onLine || queue.length === 0) return;

  const btn = document.getElementById("syncBtn");
  btn.disabled = true;
  btn.innerText = "Syncing...";

  showToast("Syncing " + queue.length + "...");

  let remaining = [];

  for (const item of queue){

    const url =
      API_URL +
      "?scanId=" + encodeURIComponent(item.scanId) +
      "&itemId=" + encodeURIComponent(item.itemId) +
      "&qty=" + encodeURIComponent(item.qty) +
      "&po=" + encodeURIComponent(item.po) +
      "&user=" + encodeURIComponent(item.user);

    try {
      const d = JSON.parse(await (await fetch(url)).text());
      if (!d.success) throw new Error();
    } catch(e){
      remaining.push(item);
    }
  }

  queue = remaining;
  saveQueue();

  btn.disabled = false;
  btn.innerText = "Sync";

  if (queue.length === 0) {
    showToast("✅ Sync complete", "success");
  } else {
    showToast("⚠ " + queue.length + " pending", "error");
  }
}

/* =========================
   AUTO SYNC
========================= */
window.addEventListener("load", flushQueue);
window.addEventListener("online", flushQueue);

/* =========================
   STOP
========================= */
function stopScanner(){

  shuttingDown = true;
  scanning = false;

  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
  } catch(e){}

  document.getElementById("video").srcObject = null;

  stream = null;
  reader = null;

  locked = false;
  lastCode = "";

  setTimeout(() => shuttingDown = false, 800);

  showToast("Scanner stopped");
}
</script>

</body>
</html>
