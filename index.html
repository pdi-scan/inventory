<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse Scanner Stable</title>

<script src="./js/zxing.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#111;
  color:white;
  text-align:center;
}

header {
  padding:12px;
  font-weight:800;
  background:#000;
}

video {
  width:100%;
  max-width:420px;
  border-radius:12px;
  margin-top:10px;
  background:black;
}

#frame {
  position:relative;
  display:inline-block;
}

#box {
  position:absolute;
  inset:18%;
  border:3px solid rgba(0,255,0,0.7);
  border-radius:10px;
  pointer-events:none;
}

input, button {
  width:90%;
  max-width:420px;
  padding:12px;
  margin:6px auto;
  border-radius:8px;
  border:none;
  font-weight:700;
}

button:disabled {
  opacity:0.5;
}

/* TOAST */
#toast {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#111827;
  color:white;
  padding:12px 16px;
  border-radius:10px;
  font-weight:700;
  opacity:0;
  transition:0.25s;
  z-index:9999;
  max-width:90%;
}

#toast.show {
  opacity:1;
}
</style>
</head>

<body>

<header>📦 Stable Warehouse Scanner</header>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1" min="1">

<button id="startBtn" onclick="startScanner()" disabled>Start</button>
<button onclick="stopScanner()">Stop</button>

<div id="frame">
  <video id="video" autoplay playsinline muted></video>
  <div id="box"></div>
</div>

<div id="toast"></div>

<script>
/* =========================
   CONFIG
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* =========================
   DOM
========================= */
const userEl = document.getElementById("user");
const poEl   = document.getElementById("po");
const qtyEl  = document.getElementById("qty");
const startBtn = document.getElementById("startBtn");

/* =========================
   START BUTTON CONTROL
========================= */
function updateStartState(){
  startBtn.disabled = !(userEl.value.trim() && poEl.value.trim());
}
userEl.addEventListener("input", updateStartState);
poEl.addEventListener("input", updateStartState);
updateStartState();

/* =========================
   TOAST + VIBRATION
========================= */
function showToast(msg, type="normal"){
  const t = document.getElementById("toast");
  t.innerText = msg;

  t.style.background =
    type === "error" ? "#dc2626" :
    type === "success" ? "#16a34a" :
    "#111827";

  t.classList.add("show");

  setTimeout(() => t.classList.remove("show"), 1800);

  if (navigator.vibrate) navigator.vibrate(80);
}

/* =========================
   STATE
========================= */
let stream = null;
let reader = null;

let scanning = false;
let locked = false;

let shuttingDown = false;
let sending = false;

let lastCode = "";
const RESET_MS = 1200;

/* =========================
   START
========================= */
async function startScanner(){

  if (!userEl.value.trim() || !poEl.value.trim()) {
    showToast("User and PO required", "error");
    return;
  }

  scanning = true;
  shuttingDown = false;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
  } catch(e){
    showToast("Camera access denied", "error");
    return;
  }

  document.getElementById("video").srcObject = stream;

  reader = new ZXing.BrowserMultiFormatReader();

  scanLoop();
}

/* =========================
   SCAN LOOP
========================= */
async function scanLoop(){
  if (!scanning) return;

  try {
    const video = document.getElementById("video");

    if (video.readyState === 4 && !locked) {

      const result = await reader.decodeOnceFromVideoDevice(undefined, video);

      if (result) {
        const text = result.getText().trim();

        if (shuttingDown) return;

        if (text !== lastCode) {
          locked = true;
          lastCode = text;

          handleScan(text);

          setTimeout(() => {
            locked = false;
          }, RESET_MS);
        }
      }
    }

  } catch(e) {}

  if (scanning) requestAnimationFrame(scanLoop);
}

/* =========================
   HANDLE SCAN
========================= */
function handleScan(text){

  if (sending) return;

  sending = true;

  setTimeout(() => {
    sending = false;
  }, RESET_MS);

  showToast("Scanned: " + text);

  send(text);
}

/* =========================
   SEND
========================= */
async function send(itemId){

  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(qtyEl.value || 1) +
    "&po=" + encodeURIComponent(poEl.value || "") +
    "&user=" + encodeURIComponent(userEl.value || "");

  try {
    const r = await fetch(url);
    const text = await r.text();

    let d;
    try {
      d = JSON.parse(text);
    } catch(e) {
      throw new Error("Bad response");
    }

    if (d.success) {
      showToast("✔ " + itemId + " (Remain: " + d.remaining + ")", "success");
    } else {
      showToast("❌ " + (d.error || "Error"), "error");
    }

  } catch(e){
    showToast("⚠ Network error", "error");
  }
}

/* =========================
   STOP
========================= */
function stopScanner(){

  shuttingDown = true;
  scanning = false;

  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
  } catch(e){}

  document.getElementById("video").srcObject = null;

  stream = null;
  reader = null;

  locked = false;
  lastCode = "";

  setTimeout(() => {
    shuttingDown = false;
  }, 800);

  showToast("Scanner stopped");
}
</script>

</body>
</html>
