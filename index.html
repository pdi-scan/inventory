<!DOCTYPE html>

<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, Arial;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: auto;
      border-radius: 12px;
      overflow: hidden;
      background: black;
    }

    button {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      font-size: 18px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    #status {
      margin-top: 20px;
      padding: 12px;
      background: white;
      border-radius: 8px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      font-size: 16px;
    }

    .ok { color: green; font-weight: bold; }
    .scan { color: #111827; }
  </style>

</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

  <div id="reader"></div>

<button onclick="startScanner()">📷 Start Scanner</button>

  <div id="status">Ready</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

let html5QrCode;
let scanLock = false;

async function startScanner() {

  document.getElementById("status").innerText = "Starting camera...";

  html5QrCode = new Html5Qrcode("reader");

  try {

    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 15, qrbox: 250 },
      onScanSuccess
    );

  } catch (err) {
    document.getElementById("status").innerText =
      "Camera error: " + err;
  }
}

function onScanSuccess(decodedText) {

  // 🔥 BLOCK MULTIPLE TRIGGERS
  if (scanLock) return;

  const itemId = (decodedText || "").toString().trim();

  console.log("RAW SCAN:", decodedText);
  console.log("CLEAN SCAN:", itemId);

  // 🔥 HARD VALIDATION (prevents undefined)
  if (!itemId || itemId === "undefined") {
    console.log("INVALID SCAN BLOCKED");
    return;
  }

  scanLock = true;

  html5QrCode.stop().then(() => {

    document.getElementById("status").innerHTML =
      `<span class="scan">Scanned: ${itemId}</span>`;

    sendToAPI(itemId);

    setTimeout(() => {
      scanLock = false;
      startScanner();
    }, 1500);

  }).catch(err => {
    console.log("Stop error:", err);
  });
}

function sendToAPI(itemId) {

  if (!itemId) {
    console.error("BLOCKED EMPTY ITEM");
    return;
  }

  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=1";

  console.log("CALLING:", url);

  const img = new Image();

  img.onload = function () {
    document.getElementById("status").innerHTML =
      `<span class="ok">✔ Sent: ${itemId}</span>`;
  };

  img.onerror = function () {
    document.getElementById("status").innerHTML =
      `<span class="ok">✔ Sent (no response): ${itemId}</span>`;
  };

  img.src = url;
}

</script>

</body>
</html>
