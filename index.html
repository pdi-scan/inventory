<!DOCTYPE html>
<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, Arial;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container { padding: 16px; }

    label {
      display:block;
      text-align:left;
      max-width:420px;
      margin:0 auto 4px;
      font-weight:600;
    }

    input {
      width:100%;
      max-width:420px;
      padding:14px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:16px;
    }

    #reader {
      width:100%;
      max-width:420px;
      margin:auto;
      background:black;
      border-radius:12px;
      overflow:hidden;
    }

    .button-row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:420px;
      margin:10px auto;
    }

    button {
      padding:16px;
      font-size:18px;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:bold;
      width:100%;
    }

    #startBtn { background:#2563eb; }
    #exitBtn  { background:#dc2626; }

    button:disabled {
      background:#9ca3af !important;
    }

    #status {
      margin-top:20px;
      background:white;
      padding:12px;
      border-radius:8px;
      max-width:420px;
      margin-left:auto;
      margin-right:auto;
      font-size:16px;
    }

    /* 🔥 TOAST */
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: #111827;
      color: white;
      text-align: center;
      border-radius: 8px;
      padding: 14px;
      position: fixed;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      font-size: 16px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #toast.show {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

  <label>Device/User</label>
  <input id="user" placeholder="Enter name">

  <label>Project ID</label>
  <input id="projectId" placeholder="Project ID">

  <label>Qty</label>
  <input id="qty" type="number" min="1" value="1">

  <div class="button-row">
    <button id="startBtn" onclick="startScanner()" disabled>📷 Start</button>
    <button id="exitBtn" onclick="exitApp()">❌ Exit</button>
  </div>

  <div id="reader"></div>
  <div id="status">Enter User + Project ID</div>

</div>

<!-- 🔊 AUDIO -->
<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>

<!-- 🔥 TOAST -->
<div id="toast"></div>

<script>

/* =========================
   🔧 SET YOUR REAL API URL
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* =========================
   STATE
========================= */
let qr;
let scanLock = false;
let lastScan = "";
let lastScanTime = 0;

/* =========================
   REGISTER SERVICE WORKER
========================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

/* =========================
   ELEMENTS
========================= */
const userEl = document.getElementById("user");
const projectEl = document.getElementById("projectId");
const qtyEl = document.getElementById("qty");
const startBtn = document.getElementById("startBtn");
const statusEl = document.getElementById("status");

/* =========================
   READY CHECK
========================= */
function checkReady() {
  startBtn.disabled = !(userEl.value.trim() && projectEl.value.trim());
}
userEl.addEventListener("input", checkReady);
projectEl.addEventListener("input", checkReady);

/* =========================
   TOAST
========================= */
function showToast(message) {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

/* =========================
   SOUND
========================= */
function playBeep() {
  const audio = document.getElementById("beep");
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

/* =========================
   START SCANNER
========================= */
function startScanner() {

  if (!userEl.value.trim() || !projectEl.value.trim()) {
    alert("User and Project ID required");
    return;
  }

  statusEl.innerText =
    `Project: ${projectEl.value} | User: ${userEl.value}`;

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: 250 },
    onScanSuccess
  );
}

/* =========================
   SCAN
========================= */
function onScanSuccess(text) {

  const now = Date.now();
  const item = (text || "").toString().trim();

  if (!item) return;
  if (scanLock) return;
  if (item === lastScan && (now - lastScanTime) < 2000) return;

  scanLock = true;
  lastScan = item;
  lastScanTime = now;

  qr.stop().then(() => {

    sendToAPI(item);

    setTimeout(() => {
      scanLock = false;
      startScanner();
    }, 1200);

  }).catch(()=>{});
}

/* =========================
   SEND TO API
========================= */
function sendToAPI(itemId) {

  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(qtyEl.value || 1) +
    "&projectId=" + encodeURIComponent(projectEl.value || "") +
    "&user=" + encodeURIComponent(userEl.value || "");

  fetch(url, {
    method: "GET",
    cache: "no-store"
  })
  .then(res => res.json())
  .then(data => {

    if (data && data.success) {

      showToast("✔ " + itemId);

      if (navigator.vibrate) {
        navigator.vibrate(100);
      }

      playBeep();

      statusEl.innerText = `✔ ${itemId}`;

    } else {
      alert("ERROR: " + (data.error || "Unknown error"));
      statusEl.innerText = "❌ Failed";
    }

  })
  .catch(err => {
    alert("NETWORK ERROR: " + err.message);
    statusEl.innerText = "❌ Send failed";
  });
}

/* =========================
   EXIT
========================= */
function exitApp() {

  try {
    if (qr) {
      qr.stop().catch(()=>{});
      qr.clear().catch(()=>{});
    }
  } catch (e) {}

  scanLock = false;
  lastScan = "";
  lastScanTime = 0;

  document.getElementById("reader").innerHTML = "";

  statusEl.innerText =
    "Scanner stopped. You may close the app.";
}

</script>

</body>
</html>
