<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse Zebra Scanner + API</title>

<script src="./js/zxing.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#111;
  color:white;
  text-align:center;
}

header {
  padding:12px;
  font-weight:800;
  background:#000;
}

video {
  width:100%;
  max-width:420px;
  border-radius:12px;
  margin-top:10px;
  background:black;
}

#wrap {
  position:relative;
  display:inline-block;
}

#overlay {
  position:absolute;
  inset:0;
  border:2px solid rgba(0,255,0,0.6);
  pointer-events:none;
  box-sizing:border-box;
}

input {
  width:90%;
  max-width:420px;
  padding:12px;
  margin:6px auto;
  border-radius:8px;
  border:none;
  display:block;
}

button {
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-weight:800;
}
</style>
</head>

<body>

<header>📦 Warehouse Scanner (Zebra + API)</header>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1" min="1">

<button onclick="startScanner()">Start</button>
<button onclick="stopScanner()">Stop</button>
<button onclick="toggleTorch()">Torch</button>

<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay"></div>
</div>

<script>
/* =========================
   API
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* =========================
   ZXING + STATE
========================= */
if (!window.ZXing) alert("ZXing failed to load");

const codeReader = new ZXing.BrowserMultiFormatReader();

let stream = null;
let track = null;

let scanning = false;
let locked = false;
let lastCode = "";
const RESET_MS = 1200;

/* canvas crop engine */
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

/* torch */
let torchOn = false;

/* =========================
   START CAMERA
========================= */
async function startScanner(){
  scanning = true;

  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    }
  });

  const video = document.getElementById("video");
  video.srcObject = stream;

  track = stream.getVideoTracks()[0];

  scanLoop();
}

/* =========================
   SINGLE SHOT LOOP (ZEBRA ENGINE)
========================= */
async function scanLoop(){
  if (!scanning) return;

  try {
    const video = document.getElementById("video");

    if (video.readyState === 4) {

      const w = video.videoWidth;
      const h = video.videoHeight;

      const size = Math.floor(Math.min(w, h) * 0.65);
      const sx = (w - size) / 2;
      const sy = (h - size) / 2;

      canvas.width = size;
      canvas.height = size;

      ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);

      const result = await codeReader.decodeFromCanvas(canvas);

      if (result && !locked) {
        locked = true;

        const text = result.getText().trim();
        handleScan(text);

        setTimeout(() => locked = false, RESET_MS);
      }
    }

  } catch(e) {
    // ignore decode noise
  }

  if (scanning) {
    requestAnimationFrame(scanLoop);
  }
}

/* =========================
   SCAN HANDLER
========================= */
function handleScan(text){
  alert("Scanned: " + text);

  send(text);
}

/* =========================
   API SEND
========================= */
async function send(itemId){
  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(document.getElementById("qty").value || 1) +
    "&po=" + encodeURIComponent(document.getElementById("po").value || "") +
    "&user=" + encodeURIComponent(document.getElementById("user").value || "");

  try {
    const r = await fetch(url);
    const d = await r.json();

    alert(d.success ? "✔ Sent: " + itemId : "❌ Error");
  } catch(e){
    alert("Network error");
  }
}

/* =========================
   TORCH
========================= */
async function toggleTorch(){
  try {
    if (!track) return;

    const caps = track.getCapabilities?.();
    if (!caps?.torch) {
      alert("Torch not supported");
      return;
    }

    torchOn = !torchOn;

    await track.applyConstraints({
      advanced: [{ torch: torchOn }]
    });

  } catch(e){
    console.log(e);
  }
}

/* =========================
   STOP (FULL CLEANUP)
========================= */
function stopScanner(){
  scanning = false;

  try {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
  } catch(e){}

  document.getElementById("video").srcObject = null;

  stream = null;
  track = null;
  locked = false;
}
</script>

</body>
</html>
