<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Warehouse Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family:-apple-system; margin:0; background:#111; color:white; text-align:center; }
header { padding:14px; font-weight:800; background:#000; }

.container { padding:12px; }

input {
  width:100%; max-width:420px;
  padding:14px; margin:6px auto;
  border-radius:10px; border:none;
  font-size:16px;
}

.button-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  max-width:420px;
  margin:10px auto;
}

button {
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:800;
}

#startBtn { background:#2563eb; color:white; }
#exitBtn { background:#dc2626; color:white; }
#torchBtn { background:#f59e0b; color:black; }

#reader {
  max-width:420px;
  margin:10px auto;
  border-radius:14px;
  overflow:hidden;
}

#status {
  margin-top:10px;
  font-weight:700;
  min-height:24px;
}

.flash {
  animation:flash 0.2s;
}
@keyframes flash {
  from { background:white; }
  to { background:transparent; }
}
</style>
</head>

<body>

<header>📦 Warehouse Scanner</header>

<div class="container">

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1" min="1">

<div class="button-row">
  <button id="startBtn">Start</button>
  <button id="exitBtn">Exit</button>
</div>

<div class="button-row">
  <button id="torchBtn">Toggle Light</button>
  <button id="modeBtn">Mode: Confirm</button>
</div>

<div id="reader"></div>
<div id="status"></div>

</div>

<script>
const API_URL = "YOUR_API_URL";

let qr = null;
let scanning = false;
let scanLock = false;
let lastScan = "";
let lastTime = 0;

let torchOn = false;
let instantMode = false;

const statusEl = document.getElementById("status");

function setStatus(msg){
  statusEl.innerText = msg;
}

function beep(){
  navigator.vibrate?.(80);
}

function normalize(text){
  text = text.trim();

  // extract ID from URL if needed
  try {
    if (text.startsWith("http")) {
      const url = new URL(text);
      text = url.pathname.split("/").pop();
    }
  } catch(e){}

  return text.toUpperCase();
}

/* ---------- START CAMERA ---------- */
async function startCamera(){
  if (scanning) return;

  qr = qr || new Html5Qrcode("reader");

  try {
    await qr.start(
      { facingMode:"environment" },
      {
        fps:15,
        qrbox:(w,h)=>{
          const s = Math.min(w,h)*0.75;
          return { width:s, height:s };
        }
      },
      onScan
    );

    scanning = true;
    setStatus("Ready");
  } catch(e){
    alert("Camera error: " + e.message);
  }
}

/* ---------- SCAN ---------- */
function onScan(text){
  const now = Date.now();

  if (scanLock) return;
  if (text === lastScan && now - lastTime < 1200) return;

  scanLock = true;
  lastScan = text;
  lastTime = now;

  text = normalize(text);

  document.body.classList.add("flash");
  setTimeout(()=>document.body.classList.remove("flash"), 100);

  beep();

  if (instantMode){
    send(text);
    setTimeout(()=>scanLock=false, 400);
  } else {
    if (confirm("Scan: " + text)){
      send(text);
    }
    scanLock = false;
  }
}

/* ---------- SEND ---------- */
async function send(itemId){
  setStatus("Sending...");

  const url = API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(document.getElementById("qty").value) +
    "&po=" + encodeURIComponent(document.getElementById("po").value) +
    "&user=" + encodeURIComponent(document.getElementById("user").value);

  try {
    const r = await fetch(url);
    const d = await r.json();

    if (d.success){
      setStatus("✔ " + itemId);
    } else {
      setStatus("❌ " + (d.error || "Error"));
    }
  } catch(e){
    setStatus("Network error");
  }
}

/* ---------- TORCH ---------- */
document.getElementById("torchBtn").onclick = async () => {
  if (!qr) return;

  try {
    const track = qr.getRunningTrack();
    await track.applyConstraints({
      advanced: [{ torch: !torchOn }]
    });
    torchOn = !torchOn;
  } catch(e){
    alert("Torch not supported");
  }
};

/* ---------- MODE ---------- */
document.getElementById("modeBtn").onclick = (e)=>{
  instantMode = !instantMode;
  e.target.innerText = instantMode ? "Mode: Instant" : "Mode: Confirm";
};

/* ---------- START / EXIT ---------- */
document.getElementById("startBtn").onclick = ()=>{
  if (!user.value || !po.value){
    alert("User + PO required");
    return;
  }
  startCamera();
};

document.getElementById("exitBtn").onclick = async ()=>{
  try {
    if (qr && scanning){
      await qr.stop();
      await qr.clear();
    }
  } catch(e){}

  scanning = false;
  scanLock = false;
  setStatus("Stopped");
};
</script>

</body>
</html>
