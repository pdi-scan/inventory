<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Industrial Scanner Mode</title>

<script src="./js/zxing.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#111;
  color:white;
  text-align:center;
}

header {
  padding:12px;
  font-weight:800;
  background:#000;
}

video {
  width:100%;
  max-width:420px;
  border-radius:12px;
  margin-top:10px;
}

#frame {
  position:relative;
  display:inline-block;
}

#box {
  position:absolute;
  inset:18%;
  border:3px solid rgba(0,255,0,0.7);
  border-radius:10px;
  pointer-events:none;
}

input, button {
  width:90%;
  max-width:420px;
  padding:12px;
  margin:6px auto;
  border-radius:8px;
  border:none;
  font-weight:700;
}
</style>
</head>

<body>

<header>📦 Industrial Scanner Mode</header>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1" min="1">

<button onclick="startScanner()">Start</button>
<button onclick="stopScanner()">Stop</button>

<div id="frame">
  <video id="video" autoplay playsinline muted></video>
  <div id="box"></div>
</div>

<script>
/* =========================
   CONFIG
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/* =========================
   STATE
========================= */
let stream = null;
let reader = null;

let scanning = false;
let locked = false;

let lastCode = "";
let lastTime = 0;

/* performance tuning */
const MIN_INTERVAL = 900; // prevents double scans

/* =========================
   START CAMERA
========================= */
async function startScanner(){
  scanning = true;

  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    }
  });

  document.getElementById("video").srcObject = stream;

  reader = new ZXing.BrowserMultiFormatReader();

  scanLoop();
}

/* =========================
   INDUSTRIAL SCAN LOOP
========================= */
async function scanLoop(){
  if (!scanning) return;

  try {
    const video = document.getElementById("video");

    if (video.readyState === 4 && !locked) {

      const result = await reader.decodeOnceFromVideoDevice(undefined, video);

      if (result) {

        const text = result.getText().trim();
        const now = Date.now();

        /* =========================
           INDUSTRIAL GATE
        ========================= */

        // prevent duplicates
        if (text === lastCode && now - lastTime < MIN_INTERVAL) {
          return schedule();
        }

        // lock immediately (first valid frame wins)
        locked = true;
        lastCode = text;
        lastTime = now;

        handleScan(text);
      }
    }

  } catch(e) {
    // ignore decode noise
  }

  schedule();
}

/* =========================
   LOOP CONTROL
========================= */
function schedule(){
  if (scanning) requestAnimationFrame(scanLoop);
}

/* =========================
   AUTO QUALITY GATE (SIMPLIFIED)
========================= */
function handleScan(text){
  // “confidence simulation”:
  // if ZXing returns text, we assume valid barcode (industrial assumption)

  alert("SCANNED: " + text);

  send(text);

  // unlock after short stabilization window
  setTimeout(() => {
    locked = false;
  }, MIN_INTERVAL);
}

/* =========================
   API
========================= */
async function send(itemId){
  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(document.getElementById("qty").value || 1) +
    "&po=" + encodeURIComponent(document.getElementById("po").value || "") +
    "&user=" + encodeURIComponent(document.getElementById("user").value || "");

  try {
    const r = await fetch(url);
    const d = await r.json();

    alert(d.success ? "✔ Sent" : "❌ Error");
  } catch(e){
    alert("Network error");
  }
}

/* =========================
   STOP
========================= */
function stopScanner(){
  scanning = false;

  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
  } catch(e){}

  document.getElementById("video").srcObject = null;

  stream = null;
  reader = null;
  locked = false;
  lastCode = "";
}
</script>

</body>
</html>
