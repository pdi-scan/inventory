<!DOCTYPE html>

<html>
<head>
  <title>Inventory Scanner</title>

  <!-- Mobile viewport -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- QR Scanner Library -->

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      background: black;
    }

    button {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      font-size: 18px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    button:active {
      background: #1d4ed8;
    }

    #status {
      margin-top: 20px;
      font-size: 16px;
      padding: 12px;
      border-radius: 8px;
      background: white;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .success { color: #16a34a; font-weight: bold; }
    .error { color: #dc2626; font-weight: bold; }
    .scanned { color: #111827; }
  </style>

</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

  <div id="reader"></div>

<button onclick="startScanner()">📷 Start Scanner</button>

  <div id="status">Tap “Start Scanner” to begin</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwbYo7Sms6IetRxosD0zKER4TgGWSNv9ip4nStnlcbIrlIcNtFYqvr61FJNy55riprZ/exec";

let scanner;
let scanning = false;

function startScanner() {

  if (scanning) return;
  scanning = true;

  document.getElementById("status").innerText = "Starting camera...";

  scanner = new Html5Qrcode("reader");

  const config = {
    fps: 15,
    qrbox: function(viewfinderWidth, viewfinderHeight) {
      let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
      let size = Math.floor(minEdge * 0.7);
      return { width: size, height: size };
    },
    aspectRatio: 1.0
  };

  Html5Qrcode.getCameras().then(devices => {

    if (devices && devices.length) {

      const backCamera = devices.find(d =>
        d.label.toLowerCase().includes("back") ||
        d.label.toLowerCase().includes("rear")
      );

      const cameraId = backCamera ? backCamera.id : devices[0].id;

      scanner.start(
        cameraId,
        config,
        onScanSuccess,
        () => {}
      );

    } else {
      document.getElementById("status").innerText =
        "No cameras found.";
    }

  }).catch(err => {
    document.getElementById("status").innerText =
      "Camera error: " + err;
  });
}

function onScanSuccess(decodedText) {

  scanner.stop(); // prevent duplicate scans

  document.getElementById("status").innerHTML =
    `<span class="scanned">Scanned: ${decodedText}</span>`;

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      itemId: decodedText,
      qty: 1
    })
  })
  .then(res => res.json())
  .then(data => {

    document.getElementById("status").innerHTML =
      `<span class="success">
        ✔ ${data.itemId}<br>
        Remaining: ${data.remaining}
      </span>`;

    // restart scanner after short delay
    setTimeout(() => {
      scanning = false;
      startScanner();
    }, 1500);

  })
  .catch(err => {

    document.getElementById("status").innerHTML =
      `<span class="error">Error: ${err.message}</span>`;

    setTimeout(() => {
      scanning = false;
      startScanner();
    }, 2000);
  });
}

</script>

</body>
</html>
