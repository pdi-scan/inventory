<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Optional PWA bits -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <!-- html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family:-apple-system, Arial, sans-serif; margin:0; background:#f3f4f6; text-align:center; }
    header { background:#111827; color:white; padding:16px; font-size:20px; }

    .container { padding:16px; }

    label { display:block; text-align:left; max-width:420px; margin:0 auto 4px; font-weight:700; }

    input {
      width:100%; max-width:420px; padding:14px;
      margin:0 auto 10px; border-radius:10px; border:1px solid #cbd5e1;
      box-sizing:border-box; font-size:16px; background:white;
    }

    .button-row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:420px;
      margin:10px auto;
    }

    button {
      padding:14px;
      font-size:16px;
      border:none;
      border-radius:12px;
      color:white;
      font-weight:800;
      cursor:pointer;
    }
    button:disabled { opacity:0.6; cursor:not-allowed; }

    #startBtn { background:#2563eb; }
    #exitBtn  { background:#dc2626; }

    #torchBtn {
      width:100%;
      max-width:420px;
      margin:0 auto 10px;
      background:#111827;
      display:none;
    }

    #reader {
      width:100%;
      max-width:420px;
      margin:0 auto;
      background:black;
      border-radius:14px;
      overflow:hidden;
      position:relative;
      min-height:280px;
    }

    #focusRing {
      position:absolute;
      width:80px;
      height:80px;
      border:3px solid #facc15;
      border-radius:50%;
      pointer-events:none;
      transform:translate(-50%, -50%);
      opacity:0;
      transition:0.25s;
      z-index:10;
    }

    #toast {
      visibility:hidden;
      position:fixed;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:white;
      padding:12px 14px;
      border-radius:10px;
      opacity:0;
      transition:0.25s;
      z-index:9998;
      max-width:92vw;
    }
    #toast.show { visibility:visible; opacity:1; }

    /* Confirm modal */
    #confirmModal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.55);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }
    #confirmCard{
      width:min(420px, 92vw);
      background:white;
      border-radius:14px;
      padding:18px;
      text-align:left;
      box-shadow:0 12px 40px rgba(0,0,0,0.35);
    }
    #confirmTitle{
      font-size:18px;
      font-weight:900;
      margin-bottom:10px;
    }
    #confirmValue{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background:#f3f4f6;
      padding:12px;
      border-radius:10px;
      word-break:break-word;
      margin-bottom:14px;
    }
    #confirmActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    #confirmYesBtn{ background:#16a34a; color:white; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:900; }
    #confirmNoBtn { background:#dc2626; color:white; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:900; }

    /* Diagnostics box */
    #diag {
      max-width:420px;
      margin:10px auto 0;
      text-align:left;
      background:#fff;
      border:1px solid #e2e8f0;
      border-radius:12px;
      padding:12px;
      display:none;
      font-size:13px;
      color:#0f172a;
      white-space:pre-wrap;
      word-break:break-word;
    }
  </style>
</head>

<body>
<header>📦 Inventory Scanner</header>

<div class="container">

  <label>Device/User</label>
  <input id="user" autocomplete="off" />

  <label>PO</label>
  <input id="po" autocomplete="off" />

  <label>Qty</label>
  <input id="qty" type="number" value="1" min="1" step="1" />

  <div class="button-row">
    <button id="startBtn" onclick="startScanner()" disabled>Start</button>
    <button id="exitBtn" onclick="exitApp()">Exit</button>
  </div>

  <button id="torchBtn" type="button" onclick="toggleTorch()">🔦 Torch</button>

  <div id="reader">
    <div id="focusRing"></div>
  </div>

  <div id="diag"></div>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<div id="toast"></div>

<!-- Confirm Modal -->
<div id="confirmModal" aria-modal="true" role="dialog">
  <div id="confirmCard">
    <div id="confirmTitle">Confirm Scan</div>
    <div id="confirmValue"></div>
    <div id="confirmActions">
      <button id="confirmYesBtn" type="button">Confirm</button>
      <button id="confirmNoBtn" type="button">Rescan</button>
    </div>
  </div>
</div>

<script>
/** =========================
 *  CONFIG
 *  ========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

/** =========================
 *  STATE
 *  ========================= */
let qr = null;
let scanLock = false;
let lastScan = "";
let lastTime = 0;

let pendingScanText = null;
let isPaused = false;

let torchSupported = false;
let torchOn = false;

const userEl   = document.getElementById("user");
const poEl     = document.getElementById("po");
const qtyEl    = document.getElementById("qty");
const startBtn = document.getElementById("startBtn");

const reader   = document.getElementById("reader");
const ring     = document.getElementById("focusRing");

const torchBtn = document.getElementById("torchBtn");
const diagEl   = document.getElementById("diag");

const confirmModal  = document.getElementById("confirmModal");
const confirmValue  = document.getElementById("confirmValue");
const confirmYesBtn = document.getElementById("confirmYesBtn");
const confirmNoBtn  = document.getElementById("confirmNoBtn");

/** Enable Start only when required fields present */
userEl.oninput = poEl.oninput = () => {
  startBtn.disabled = !(userEl.value.trim() && poEl.value.trim());
};

/** =========================
 *  UI HELPERS
 *  ========================= */
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function showDiag(text) {
  diagEl.style.display = "block";
  diagEl.textContent = text;
}

function clearDiag() {
  diagEl.style.display = "none";
  diagEl.textContent = "";
}

function beep(){
  const a = document.getElementById("beep");
  a.currentTime = 0;
  a.play().catch(()=>{});
}

function openConfirm(text) {
  pendingScanText = text;
  confirmValue.textContent = text;
  confirmModal.style.display = "flex";
}

function closeConfirm() {
  confirmModal.style.display = "none";
}

/** =========================
 *  QRBOX (dynamic sizing)
 *  =========================
 * The library supports qrbox as a function that receives viewfinder size. [3](https://stackoverflow.com/questions/61649343/switching-facingmode-with-applyconstraints-not-currently-supported-media-stream)
 */
function qrboxSizing(viewfinderWidth, viewfinderHeight) {
  const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
  const size = Math.floor(minEdge * 0.65); // 65% of smaller edge
  return { width: size, height: size };
}

/** =========================
 *  START / STOP with fallbacks
 *  =========================
 * getUserMedia requires secure context (HTTPS/localhost). [1](https://stackoverflow.com/questions/78523966/need-help-setting-camera-zoom-level-using-html5qrcode-in-react-js)
 * Html5Qrcode.start accepts camera id OR MediaTrackConstraints. [2](https://scanapp.org/html5-qrcode-docs/docs/apis/classes/Html5Qrcode)
 */
async function startScanner() {
  clearDiag();

  // Secure context check (common reason for “camera failed”). [1](https://stackoverflow.com/questions/78523966/need-help-setting-camera-zoom-level-using-html5qrcode-in-react-js)
  const isLocalhost = ["localhost", "127.0.0.1"].includes(location.hostname);
  if (location.protocol !== "https:" && !isLocalhost) {
    showDiag(
      "Camera access requires HTTPS (or localhost).\n\n" +
      `Current origin: ${location.origin}\n\n` +
      "Fix: host this page on https:// (or test on http://localhost)."
    );
    alert("Camera requires HTTPS (or localhost).");
    return;
  }

  if (!userEl.value.trim() || !poEl.value.trim()) {
    alert("User and PO required");
    return;
  }

  // Create once and reuse. [2](https://scanapp.org/html5-qrcode-docs/docs/apis/classes/Html5Qrcode)
  if (!qr) {
    qr = new Html5Qrcode("reader", {
      // Experimental native BarcodeDetector can improve performance when supported. [4](https://github.com/mebjas/html5-qrcode/issues/761)
      experimentalFeatures: { useBarCodeDetectorIfSupported: true }
    });
  }

  // If already running/paused, don't create duplicate starts
  // Safely stop any previous run before starting
  try { await qr.stop(); } catch(e) {}

  scanLock = false;
  pendingScanText = null;
  isPaused = false;

  const scanConfig = {
    fps: 12,
    qrbox: qrboxSizing,
    aspectRatio: 1.0,
    formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
  };

  // Try high-res first (ideal), then simpler constraints.
  const attemptConstraints = [
    {
      label: "Back camera + ideal 1080p",
      cam: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
    },
    {
      label: "Back camera (no resolution constraints)",
      cam: { facingMode: "environment" }
    }
  ];

  // Final fallback: pick first camera by device id. [2](https://scanapp.org/html5-qrcode-docs/docs/apis/classes/Html5Qrcode)
  let cameras = [];
  try {
    cameras = await Html5Qrcode.getCameras();
  } catch(e) {}

  if (cameras && cameras.length) {
    attemptConstraints.push({
      label: "First camera by deviceId",
      cam: cameras[0].id
    });
  }

  let lastErr = null;
  for (const attempt of attemptConstraints) {
    try {
      console.log("Starting camera attempt:", attempt.label, attempt.cam);
      await qr.start(attempt.cam, scanConfig, onScanSuccess, () => {});
      await enableCameraTuning();
      showToast("Camera started");
      return;
    } catch (err) {
      console.warn("Start failed:", attempt.label, err);
      lastErr = err;
    }
  }

  // If all attempts failed, show real error name/message
  const errName = lastErr?.name || "Error";
  const errMsg  = lastErr?.message || String(lastErr || "");
  showDiag(
    "Camera start failed after multiple attempts.\n\n" +
    `${errName}: ${errMsg}\n\n` +
    "Common causes:\n" +
    "- Permission denied (browser/site settings)\n" +
    "- Another app is using the camera\n" +
    "- In-app browser limitations (try opening in Safari/Chrome)\n" +
    "- Constraints not satisfiable\n"
  );
  alert(`Camera failed.\n\n${errName}: ${errMsg}`);
}

async function exitApp(){
  closeConfirm();
  pendingScanText = null;
  scanLock = false;
  isPaused = false;
  torchOn = false;
  torchBtn.style.display = "none";

  if (qr) {
    try { await qr.stop(); } catch(e){}
    try { await qr.clear(); } catch(e){} // clear() exists in Html5Qrcode API. [2](https://scanapp.org/html5-qrcode-docs/docs/apis/classes/Html5Qrcode)
  }
}

/** =========================
 *  PAUSE / RESUME (scan -> pause -> confirm)
 *  =========================
 * Html5Qrcode exposes pause(shouldPauseVideo?) and resume(). [2](https://scanapp.org/html5-qrcode-docs/docs/apis/classes/Html5Qrcode)
 */
async function pauseScanner() {
  if (!qr) return;

  if (typeof qr.pause === "function") {
    try {
      qr.pause(true); // freeze video frame for confirmation. [2](https://scanapp.org/html5-qrcode-docs/docs/apis/classes/Html5Qrcode)
      isPaused = true;
      return;
    } catch (e) {}
  }

  // Fallback if pause isn't available in your build: stop (less ideal).
  try {
    await qr.stop();
    isPaused = true;
  } catch (e) {}
}

async function resumeScanner() {
  if (!qr) return;

  if (typeof qr.resume === "function") {
    try {
      qr.resume(); // resumes scanning (and video if paused). [2](https://scanapp.org/html5-qrcode-docs/docs/apis/classes/Html5Qrcode)
      isPaused = false;
      return;
    } catch (e) {}
  }

  // Fallback: restart the camera
  isPaused = false;
  startScanner();
}

/** =========================
 *  CAMERA TUNING (zoom/torch/focus)
 *  =========================
 * Html5Qrcode provides getRunningTrackCapabilities + applyVideoConstraints. [2](https://scanapp.org/html5-qrcode-docs/docs/apis/classes/Html5Qrcode)
 */
async function enableCameraTuning(){
  try {
    const caps = await qr.getRunningTrackCapabilities();

    torchSupported = !!caps.torch;
    torchBtn.style.display = torchSupported ? "block" : "none";

    const advanced = [];

    // Zoom helps small QR codes when supported.
    if (caps.zoom) {
      const targetZoom = Math.min(3, caps.zoom.max);
      advanced.push({ zoom: targetZoom });
    }

    // Try to keep torch state consistent if available
    if (torchSupported) {
      advanced.push({ torch: torchOn });
    }

    // focusMode/exposureMode support varies by browser/device; apply if supported.
    if (caps.focusMode) advanced.push({ focusMode: "continuous" });
    if (caps.exposureMode) advanced.push({ exposureMode: "continuous" });

    if (advanced.length) {
      await qr.applyVideoConstraints({ advanced });
    }
  } catch(e){
    // ignore unsupported capabilities
  }
}

async function toggleTorch(){
  if (!torchSupported || !qr) return;
  torchOn = !torchOn;

  try {
    await qr.applyVideoConstraints({ advanced: [{ torch: torchOn }] });
    showToast(torchOn ? "Torch ON" : "Torch OFF");
  } catch(e) {
    torchOn = false;
    showToast("Torch not supported");
  }
}

/** =========================
 *  TAP FEEDBACK (focus ring)
 *  ========================= */
reader.addEventListener("click", async (e) => {
  const rect = reader.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  ring.style.left = x + "px";
  ring.style.top = y + "px";
  ring.style.opacity = 1;
  setTimeout(() => ring.style.opacity = 0, 350);

  // Best-effort focusMode re-apply (supported varies)
  try {
    if (qr && !isPaused) {
      await qr.applyVideoConstraints({ advanced: [{ focusMode: "continuous" }] });
    }
  } catch(e){}
});

/** =========================
 *  SCAN CALLBACK (pause -> confirm)
 *  ========================= */
async function onScanSuccess(decodedText){
  const text = decodedText;
  const now = Date.now();

  if (scanLock) return;
  if (text === lastScan && now - lastTime < 2000) return;

  scanLock = true;
  lastScan = text;
  lastTime = now;

  await pauseScanner();
  openConfirm(text);
}

/** Confirm / Rescan buttons */
confirmYesBtn.addEventListener("click", async () => {
  if (!pendingScanText) return;

  closeConfirm();
  const toSend = pendingScanText;
  pendingScanText = null;

  await send(toSend);

  // Cooldown so they don’t instantly re-scan the same label
  setTimeout(async () => {
    scanLock = false;
    await resumeScanner();
  }, 700);
});

confirmNoBtn.addEventListener("click", async () => {
  closeConfirm();
  pendingScanText = null;
  scanLock = false;
  await resumeScanner();
});

/** =========================
 *  SEND
 *  ========================= */
async function send(itemId){
  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(qtyEl.value || 1) +
    "&po=" + encodeURIComponent(poEl.value || "") +
    "&user=" + encodeURIComponent(userEl.value || "");

  try {
    const r = await fetch(url);
    const d = await r.json();

    if (d.success) {
      showToast("✔ " + itemId);
      if (navigator.vibrate) navigator.vibrate(100);
      beep();
    } else {
      alert(d.error || "Unknown error");
    }
  } catch (e) {
    alert("Network error: " + e.message);
  }
}
</script>
</body>
</html>
