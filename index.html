<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZXing Warehouse Scanner</title>

<script src="https://unpkg.com/@zxing/browser@0.1.4/umd/index.min.js"></script>

<style>
body { margin:0; font-family:-apple-system; background:#111; color:white; text-align:center; }
header { padding:12px; font-weight:800; background:#000; }

video {
  width:100%;
  max-width:420px;
  margin-top:10px;
  border-radius:12px;
}

input {
  width:90%;
  max-width:420px;
  padding:12px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button {
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-weight:800;
}

#status { margin-top:10px; font-weight:700; }
</style>
</head>

<body>

<header>📦 ZXing Scanner</header>

<input id="user" placeholder="User">
<input id="po" placeholder="PO">
<input id="qty" type="number" value="1">

<br>

<button id="startBtn">Start</button>
<button id="exitBtn">Exit</button>
<button id="modeBtn">Mode: Confirm</button>

<video id="video" autoplay playsinline></video>

<div id="status"></div>

<script>
const API_URL = "YOUR_API_URL";

let codeReader = null;
let videoStream = null;

let scanLock = false;
let lastScan = "";
let lastTime = 0;
let instantMode = false;

const statusEl = document.getElementById("status");
const video = document.getElementById("video");

function setStatus(msg){
  statusEl.innerText = msg;
}

function beep(){
  navigator.vibrate?.(80);
}

function normalize(text){
  text = text.trim();
  try {
    if (text.startsWith("http")){
      const url = new URL(text);
      text = url.pathname.split("/").pop();
    }
  } catch(e){}
  return text.toUpperCase();
}

/* ---------- START CAMERA ---------- */
async function startScanner(){
  if (codeReader) return;

  codeReader = new ZXingBrowser.BrowserMultiFormatReader();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });

    video.srcObject = stream;
    videoStream = stream;

    const track = stream.getVideoTracks()[0];

    // Try torch
    try {
      await track.applyConstraints({ advanced:[{ torch:true }] });
    } catch(e){}

    // Decode loop
    codeReader.decodeFromVideoElementContinuously(video, (result, err) => {
      if (result){
        handleScan(result.getText());
      }
    });

    setStatus("Ready");
  } catch(e){
    alert("Camera error: " + e.message);
  }
}

/* ---------- SCAN ---------- */
function handleScan(text){
  const now = Date.now();

  if (scanLock) return;
  if (text === lastScan && now - lastTime < 600) return;

  scanLock = true;
  lastScan = text;
  lastTime = now;

  text = normalize(text);

  beep();

  if (instantMode){
    send(text);
    setTimeout(()=>scanLock=false, 300);
  } else {
    if (confirm("Scan: " + text)){
      send(text);
    }
    scanLock = false;
  }
}

/* ---------- SEND ---------- */
async function send(itemId){
  setStatus("Sending...");

  const url = API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=" + encodeURIComponent(document.getElementById("qty").value) +
    "&po=" + encodeURIComponent(document.getElementById("po").value) +
    "&user=" + encodeURIComponent(document.getElementById("user").value);

  try {
    const r = await fetch(url);
    const d = await r.json();

    if (d.success){
      setStatus("✔ " + itemId);
    } else {
      setStatus("❌ " + d.error);
    }
  } catch(e){
    setStatus("Network error");
  }
}

/* ---------- BUTTONS ---------- */
document.getElementById("startBtn").onclick = ()=>{
  if (!user.value || !po.value){
    alert("User + PO required");
    return;
  }
  startScanner();
};

document.getElementById("exitBtn").onclick = ()=>{
  if (videoStream){
    videoStream.getTracks().forEach(t => t.stop());
  }
  codeReader = null;
  setStatus("Stopped");
};

document.getElementById("modeBtn").onclick = (e)=>{
  instantMode = !instantMode;
  e.target.innerText = instantMode ? "Mode: Instant" : "Mode: Confirm";
};
</script>

</body>
</html>
