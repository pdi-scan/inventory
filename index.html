<!DOCTYPE html>
<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, Arial;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container { padding: 16px; }

    label {
      display:block;
      text-align:left;
      max-width:420px;
      margin:0 auto 4px;
      font-weight:600;
    }

    input {
      width:100%;
      max-width:420px;
      padding:14px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    #reader {
      width:100%;
      max-width:420px;
      margin:auto;
      background:black;
      border-radius:12px;
    }

    .button-row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:420px;
      margin:10px auto;
    }

    button {
      padding:16px;
      font-size:18px;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:bold;
    }

    #startBtn { background:#2563eb; }
    #exitBtn { background:#dc2626; }

    #status {
      margin-top:20px;
      background:white;
      padding:12px;
      border-radius:8px;
      max-width:420px;
      margin-left:auto;
      margin-right:auto;
    }
  </style>
</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

  <label>User</label>
  <input id="user" placeholder="Enter name">

  <label>Project ID</label>
  <input id="projectId" placeholder="Project ID">

  <label>Qty</label>
  <input id="qty" type="number" value="1">

  <div class="button-row">
    <button id="startBtn" onclick="startScanner()" disabled>Start</button>
    <button id="exitBtn" onclick="exitApp()">Exit</button>
  </div>

  <div id="reader"></div>
  <div id="status">Ready</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

let qr;
let scanLock = false;
let lastScan = "";
let lastScanTime = 0;

/* ================= PWA ================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

/* ================= READY ================= */
user.oninput = projectId.oninput = () => {
  startBtn.disabled = !(user.value.trim() && projectId.value.trim());
};

/* ================= START ================= */
function startScanner() {

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: 250 },
    onScanSuccess
  );
}

/* ================= SCAN ================= */
function onScanSuccess(text) {

  const now = Date.now();
  const item = text.trim();

  if (!item) return;
  if (scanLock) return;
  if (item === lastScan && (now - lastScanTime) < 2000) return;

  scanLock = true;
  lastScan = item;
  lastScanTime = now;

  qr.stop().then(() => {

    sendToAPI(item);

    setTimeout(() => {
      scanLock = false;
      startScanner();
    }, 1200);

  });
}

/* ================= SEND (FIXED) ================= */
function sendToAPI(itemId) {

  const payload = {
    itemId: itemId,
    qty: Number(qty.value) || 1,
    projectId: projectId.value.trim(),
    user: user.value.trim()
  };

  console.log("Sending:", payload);

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload),
    cache: "no-store"
  })
  .then(res => res.text())
  .then(data => {
    console.log("Response:", data);
    status.innerText = "✔ " + itemId;
  })
  .catch(err => {
    console.error(err);
    status.innerText = "❌ Error sending scan";
  });
}

/* ================= EXIT ================= */
function exitApp() {

  if (qr) {
    qr.stop().catch(()=>{});
    qr.clear().catch(()=>{});
  }

  scanLock = false;
  lastScan = "";

  reader.innerHTML = "";
  status.innerText = "Scanner stopped";
}

</script>

</body>
</html>
