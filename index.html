<!DOCTYPE html>

<html>
<head>
  <title>Inventory Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: -apple-system, Arial;
      margin: 0;
      background: #f3f4f6;
      text-align: center;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: auto;
      border-radius: 12px;
      overflow: hidden;
      background: black;
    }

    button {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      font-size: 18px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    #status {
      margin-top: 20px;
      padding: 12px;
      background: white;
      border-radius: 8px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      font-size: 16px;
    }

    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
    .scan { color: #111827; }
  </style>

</head>

<body>

<header>📦 Inventory Scanner</header>

<div class="container">

  <div id="reader"></div>

<button onclick="startScanner()">📷 Start Scanner</button>

  <div id="status">Tap “Start Scanner”</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxRapCp8opT14sx21CKx-K4clBTsDtgv28WY9boNGIruSe8fBKBFekH6sGXkfocp6wK/exec";

let html5QrCode;
let scanning = false;

async function startScanner() {

  if (scanning) return;
  scanning = true;

  document.getElementById("status").innerText = "Starting camera...";

  html5QrCode = new Html5Qrcode("reader");

  try {

    await html5QrCode.start(
      { facingMode: { exact: "environment" } },
      {
        fps: 20,
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
          return {
            width: Math.floor(minEdge * 0.8),
            height: Math.floor(minEdge * 0.8)
          };
        },
        aspectRatio: 1.0
      },
      onScanSuccess
    );

  } catch (err) {
    document.getElementById("status").innerText =
      "Camera error: " + err;
  }
}

function onScanSuccess(decodedText) {

  html5QrCode.stop();

  // 🔥 CLEAN QR INPUT
  const cleanId = String(decodedText).trim();

  document.getElementById("status").innerHTML =
    `<span class="scan">Scanned: ${cleanId}</span>`;

  sendToAPI(cleanId);
}

function sendToAPI(itemId) {

  // 🔥 CONSISTENT PARAM NAME: itemId (NOT itemID)
  const url =
    API_URL +
    "?itemId=" + encodeURIComponent(itemId) +
    "&qty=1";

  fetch(url, { method: "GET" })
    .then(res => res.text())
    .then(text => {

      const data = JSON.parse(text);

      document.getElementById("status").innerHTML =
        `<span class="success">
          ✔ ${data.itemId}<br>
          Remaining: ${data.remaining}
        </span>`;

      setTimeout(() => {
        scanning = false;
        startScanner();
      }, 1500);

    })
    .catch(err => {

      document.getElementById("status").innerHTML =
        `<span class="error">Load failed: ${err.message}</span>`;
    });
}

</script>

</body>
</html>
